<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGraph RAG Agent</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       全局基础层
    ═══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg-deep:       #0c0c0e;
      --bg-base:        #111113;
      --bg-elevated:    rgba(255,255,255,0.03);
      --bg-card:        rgba(255,255,255,0.02);
      --border-subtle:  rgba(255,255,255,0.06);
      --border-light:   rgba(255,255,255,0.10);
      --text-primary:   #fafafa;
      --text-secondary: #888;
      --text-muted:     #555;
      --accent:         #e8e8e8;
      --accent-dim:    rgba(250,250,250,0.08);
      --font-sans:      'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono:      'DM Mono', 'SF Mono', monospace;
      --radius-sm:      8px;
      --radius-md:      12px;
      --radius-lg:      18px;
      --blur-sm:        blur(12px);
      --blur-md:        blur(24px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-sans);
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* 背景：克制的垂直渐变，顶部略亮 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1a1a1e 0%, var(--bg-deep) 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* 微妙的边角雾气效果 */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; height: 300px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.015) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       玻璃卡片基础样式
    ═══════════════════════════════════════════════════════════════════════ */
    .glass {
      background: var(--bg-card);
      backdrop-filter: var(--blur-md);
      -webkit-backdrop-filter: var(--blur-md);
      border: 1px solid var(--border-subtle);
      transition: border-color 250ms ease, background 250ms ease;
    }
    .glass:hover {
      border-color: var(--border-light);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       布局
    ═══════════════════════════════════════════════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* 顶部导航 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      flex-shrink: 0;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-mark svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 1.5;
    }
    .brand-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .brand-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-left: 4px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 控件组 */
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 1px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 2px;
    }
    .ctrl-group select {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font-sans);
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      border-radius: 5px;
    }
    .ctrl-group select:hover {
      color: var(--text-primary);
      background: var(--accent-dim);
    }
    .ctrl-group select option {
      background: #1a1a1e;
    }

    /* 图标按钮 */
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 180ms ease;
    }
    .icon-btn:hover {
      background: var(--accent-dim);
      color: var(--text-primary);
    }
    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 主体布局 */
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      padding: 0 24px 20px;
      overflow: hidden;
      min-height: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       聊天区域
    ═══════════════════════════════════════════════════════════════════════ */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .chat-header-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* 消息列表 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
    }

    /* 消息行 */
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: msgIn 250ms cubic-bezier(0.2, 0, 0, 1) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg-avatar svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.65;
      letter-spacing: -0.005em;
    }
    .msg.user .msg-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
    }
    .msg.assistant .msg-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
    }

    /* 消息内容样式 */
    .msg-bubble p { margin: 0 0 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
    }
    .msg-bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(0,0,0,0.25);
      padding: 2px 5px;
      border-radius: 4px;
    }
    .msg-bubble pre code {
      background: transparent;
      padding: 0;
    }
    .msg-bubble ul, .msg-bubble ol {
      padding-left: 18px;
      margin: 4px 0;
    }
    .msg-bubble li { margin: 3px 0; }

    /* 加载指示器 */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    .loading-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }

    /* 输入区 */
    .input-section {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    .text-input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      padding: 11px 16px;
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      resize: none;
      transition: border-color 200ms ease, background 200ms ease;
      line-height: 1.5;
      min-height: 44px;
      max-height: 120px;
    }
    .text-input::placeholder { color: var(--text-muted); }
    .text-input:focus {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }

    /* 发送按钮 */
    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 180ms ease;
    }
    .send-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
      border-color: var(--border-light);
      color: var(--text-primary);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .send-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       右侧面板
    ═══════════════════════════════════════════════════════════════════════ */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      min-height: 0;
    }

    /* 通用面板卡片 */
    .panel-card {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
    }
    .panel-card:first-child { flex: 1.2; }
    .panel-card:last-child { flex: 1; }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .panel-count {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: var(--bg-elevated);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

    /* 空状态 */
    .empty-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--text-muted);
      padding: 20px;
    }
    .empty-hint svg {
      width: 28px;
      height: 28px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.2;
      opacity: 0.5;
    }
    .empty-hint p {
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    /* 工具调用项 */
    .tool-entry {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
    }
    .tool-entry:last-child { margin-bottom: 0; }
    .tool-name {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .tool-data {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
      line-height: 1.4;
    }

    /* 记忆卡片 */
    .mem-card {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
    }
    .mem-card:last-child { margin-bottom: 0; }
    .mem-tag {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .mem-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .mem-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .mem-level {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }
    .mem-del {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      transition: all 150ms ease;
    }
    .mem-del:hover {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.2);
      color: #ef4444;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       Toast 提示
    ═══════════════════════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: rgba(20,20,22,0.95);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      z-index: 100;
      animation: toastIn 200ms ease both;
      backdrop-filter: var(--blur-sm);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toast.success { border-color: rgba(74,222,128,0.2); color: #4ade80; }
    .toast.error   { border-color: rgba(248,113,113,0.2); color: #f87171; }

    /* ═══════════════════════════════════════════════════════════════════════
       成本弹窗
    ═══════════════════════════════════════════════════════════════════════ */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 150ms ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: #141416;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 28px;
      min-width: 300px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: modalIn 200ms cubic-bezier(0.2, 0, 0, 1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-box h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--text-primary);
    }
    .cost-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 13px;
    }
    .cost-line:last-of-type { border: none; }
    .cost-lbl { color: var(--text-muted); }
    .cost-val { font-family: var(--font-mono); color: var(--text-secondary); }
    .cost-big { font-size: 18px; font-weight: 500; color: var(--text-primary); }
    .modal-done {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .modal-done:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
    }

    /* 响应式 */
    @media (max-width: 960px) {
      .main-layout {
        grid-template-columns: 1fr;
        overflow-y: auto;
      }
      .side-panel { display: none; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <span class="brand-text">RAG Agent</span>
      <span class="brand-sub" id="user-badge">—</span>
    </div>
    <div class="topbar-actions">
      <div class="ctrl-group">
        <select id="model-select" title="Model">
          <option value="deepseek-chat">V3</option>
          <option value="deepseek-reasoner">R1</option>
        </select>
      </div>
      <button class="icon-btn" id="btn-reset" title="Reset session">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="btn-cost" title="Cost report">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01M16 12h.01"/></svg>
      </button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="main-layout">

    <!-- 聊天面板 -->
    <section class="chat-panel glass">
      <div class="chat-header">
        <div class="chat-header-title">Conversation</div>
      </div>

      <div class="messages" id="chat-msgs">
        <div class="empty-hint" id="empty-state">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>Send a message to begin.<br/>The agent will remember your preferences.</p>
        </div>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            class="text-input"
            placeholder="Type a message..."
            rows="1"
            onkeydown="onInputKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- 右侧面板 -->
    <aside class="side-panel">

      <!-- 工具调用 -->
      <div class="panel-card glass">
        <div class="panel-header">
          <span class="panel-label">Tool Calls</span>
          <span class="panel-count" id="tool-num">0</span>
        </div>
        <div class="panel-body" id="tool-log">
          <div class="empty-hint">
            <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            <p>Tool calls appear here</p>
          </div>
        </div>
      </div>

      <!-- 记忆面板 -->
      <div class="panel-card glass">
        <div class="panel-header">
          <span class="panel-label">Memory</span>
          <span class="panel-count" id="mem-num">0</span>
        </div>
        <div class="panel-body" id="mem-list">
          <div class="empty-hint">
            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg>
            <p>Long-term memory<br/>is stored here</p>
          </div>
        </div>
      </div>

    </aside>
  </main>
</div>

<script>
/* ── 全局状态 ─────────────────────────────────────────────────────────── */
const S = {
  threadId: localStorage.getItem('rag_tid') || (() => {
    const id = 't_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('rag_tid', id);
    return id;
  })(),
  model: 'deepseek-chat',
  busy: false,
  tools: [],
  msgs: [],
};

/* ── 工具函数 ─────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function scrollBot(el) {
  el.scrollTop = el.scrollHeight;
}

function toast(msg, type) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function md(text) {
  if (!text) return '';
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) =>
    `<pre><code class="lang-${esc(l)}">${esc(c.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  text = text.replace(/(^|\n)([·\-\*]) (.+)/g, '$1<li>$3</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  text = text.split(/\n\n+/).map(p => `<p>${p}</p>`).join('');
  text = text.replace(/\n(?!<)/g, '<br/>');
  return text;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

/* ── 消息渲染 ─────────────────────────────────────────────────────────── */
function addMsg(role, content, loading) {
  const box = document.getElementById('chat-msgs');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  if (role === 'user') {
    av.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
  } else {
    av.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>';
  }

  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  if (loading) {
    bub.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  } else {
    bub.innerHTML = md(content);
  }

  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
  scrollBot(box);
  return bub;
}

/* ── 工具日志 ─────────────────────────────────────────────────────────── */
function addTool(name, inp) {
  const log = document.getElementById('tool-log');
  const empty = log.querySelector('.empty-hint');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'tool-entry';

  let data = inp;
  if (typeof inp === 'object') {
    try { data = JSON.stringify(inp, null, 2).slice(0, 180); } catch {}
  }

  item.innerHTML = '<div class="tool-name">' + esc(name) + '</div><div class="tool-data">' + esc(String(data)) + '</div>';
  log.appendChild(item);
  scrollBot(log);
  document.getElementById('tool-num').textContent = ++S.tools.length;
}

/* ── 记忆列表 ─────────────────────────────────────────────────────────── */
async function loadMem() {
  try {
    const r = await fetch('/api/memory');
    if (!r.ok) return;
    const mems = await r.json();
    const panel = document.getElementById('mem-list');
    document.getElementById('mem-num').textContent = mems.length;

    if (!mems.length) {
      panel.innerHTML = '<div class="empty-hint"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg><p>Long-term memory<br/>is stored here</p></div>';
      return;
    }
    panel.innerHTML = mems.map(m => `
      <div class="mem-card" data-id="${esc(m.id)}">
        <div class="mem-tag">${esc(m.category)}</div>
        <div class="mem-text">${esc(m.content)}</div>
        <div class="mem-row">
          <span class="mem-level">Level ${m.importance}</span>
          <button class="mem-del" onclick="delMem('${esc(m.id)}')" title="Delete">×</button>
        </div>
      </div>
    `).join('');
  } catch(e) {}
}

async function delMem(id) {
  try {
    const r = await fetch('/api/memory/' + id, { method: 'DELETE' });
    if (r.ok) { toast('Deleted'); loadMem(); }
    else toast('Delete failed', 'error');
  } catch(e) { toast('Delete failed', 'error'); }
}

/* ── SSE 流式对话 ─────────────────────────────────────────────────────── */
async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || S.busy) return;

  S.busy = true;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  // 重置工具日志
  document.getElementById('tool-log').innerHTML = '<div class="empty-hint"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><p>Tool calls appear here</p></div>';
  document.getElementById('tool-num').textContent = '0';
  S.tools = [];

  // 用户消息
  addMsg('user', text);
  S.msgs.push({ role: 'user', content: text });

  // AI 加载状态
  const aiBubble = addMsg('assistant', '', true);

  try {
    const r = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: S.threadId, model: S.model }),
    });

    if (!r.ok) {
      aiBubble.innerHTML = '<p style="color:#f87171">Request failed: ' + r.status + '</p>';
      return;
    }

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '', full = '';

    while (true) {
      const { done, val } = await reader.read();
      if (done) break;
      buf += dec.decode(val, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const raw of lines) {
        const line = raw.trim();
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.type === 'token') {
            full += d.content;
            aiBubble.innerHTML = md(full) + '<div class="loading-dots" style="margin-top:6px"><span></span><span></span><span></span></div>';
            scrollBot(document.getElementById('chat-msgs'));
          } else if (d.type === 'tool') {
            addTool(d.name, d.input);
          } else if (d.type === 'done') {
            aiBubble.innerHTML = md(full);
            S.msgs.push({ role: 'assistant', content: full });
            loadMem();
          } else if (d.type === 'error') {
            aiBubble.innerHTML = '<p style="color:#f87171">Error: ' + esc(d.content) + '</p>';
          }
        } catch {}
      }
    }
    if (full) aiBubble.innerHTML = md(full);
  } catch(e) {
    aiBubble.innerHTML = '<p style="color:#f87171">Connection error: ' + esc(e.message) + '</p>';
  }

  S.busy = false;
  btn.disabled = false;
}

/* ── 键盘事件 ─────────────────────────────────────────────────────────── */
function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

/* ── 模型切换 ─────────────────────────────────────────────────────────── */
document.getElementById('model-select').addEventListener('change', async e => {
  const m = e.target.value;
  if (m === S.model) return;
  try {
    const r = await fetch('/api/model/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: m }),
    });
    if (r.ok) { S.model = m; toast('Model switched'); }
    else toast('Switch failed', 'error');
  } catch { toast('Switch failed', 'error'); }
});

/* ── 会话重置 ─────────────────────────────────────────────────────────── */
document.getElementById('btn-reset').addEventListener('click', async () => {
  try {
    await fetch('/api/chat/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_id: S.threadId }),
    });
    S.threadId = 't_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('rag_tid', S.threadId);
    document.getElementById('chat-msgs').innerHTML = '<div class="empty-hint" id="empty-state"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Send a message to begin.<br/>The agent will remember your preferences.</p></div>';
    document.getElementById('tool-log').innerHTML = '<div class="empty-hint"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><p>Tool calls appear here</p></div>';
    document.getElementById('tool-num').textContent = '0';
    S.msgs = []; S.tools = [];
    toast('Session reset');
  } catch { toast('Reset failed', 'error'); }
});

/* ── 成本报告 ─────────────────────────────────────────────────────────── */
document.getElementById('btn-cost').addEventListener('click', async () => {
  try {
    const r = await fetch('/api/cost');
    if (!r.ok) return;
    const d = await r.json();
    const ov = document.createElement('div');
    ov.className = 'modal-bg';
    ov.innerHTML = '<div class="modal-box"><h3>Cost Report</h3>' +
      '<div class="cost-line"><span class="cost-lbl">API Calls</span><span class="cost-val">' + d.num_calls + '</span></div>' +
      '<div class="cost-line"><span class="cost-lbl">Prompt Tokens</span><span class="cost-val">' + d.prompt_tokens.toLocaleString() + '</span></div>' +
      '<div class="cost-line"><span class="cost-lbl">Completion Tokens</span><span class="cost-val">' + d.completion_tokens.toLocaleString() + '</span></div>' +
      '<div class="cost-line"><span class="cost-lbl">Total Tokens</span><span class="cost-val">' + d.total_tokens.toLocaleString() + '</span></div>' +
      '<div class="cost-line"><span class="cost-lbl">Est. Cost</span><span class="cost-val cost-big">$' + d.total_cost_usd.toFixed(6) + '</span></div>' +
      '<button class="modal-done" onclick="this.closest(\'.modal-bg\').remove()">Done</button></div>';
    ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
    document.body.appendChild(ov);
  } catch { toast('Failed to load cost report', 'error'); }
});

/* ── 加载配置 ─────────────────────────────────────────────────────────── */
async function loadCfg() {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) return;
    const c = await r.json();
    document.getElementById('user-badge').textContent = c.user_name + ' · ' + c.current_model;
    document.getElementById('model-select').value = c.current_model;
    S.model = c.current_model;
  } catch {}
}

/* ── 初始化 ──────────────────────────────────────────────────────────── */
loadCfg();
loadMem();
</script>

</body>
</html>
