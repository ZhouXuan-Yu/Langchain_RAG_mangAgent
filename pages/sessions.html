<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会话列表 - Langchain_RAG</title>
  <script src="/lib/shared.js"></script>
  <style>
    body { background: var(--bg); }

    /* ── 工具面板样式（复用对话页设计语言） ────────────────────── */
    .qa-tool-block { border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; }
    .qa-tool-block[open] .qa-toggle { transform: rotate(180deg); }
    .qa-tool-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .qa-label {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 11px; color: #a78bfa;
    }
    .qa-label svg { width: 10px; height: 10px; stroke: #a78bfa; fill: none; stroke-width: 2; }
    .qa-toggle { font-size: 10px; color: var(--muted); transition: transform 200ms; }
    .qa-tool-body { padding: 8px 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
    .tool-entry { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); }
    .tool-entry:last-child { margin-bottom: 0; }
    .tool-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .tool-entry-name { font-size: 11px; font-family: var(--font-mono); color: #a78bfa; }
    .tool-entry-data { font-size: 10px; font-family: var(--font-mono); color: var(--muted); white-space: pre-wrap; word-break: break-all; max-height: 44px; overflow: hidden; line-height: 1.4; }
    .tool-entry-result { font-size: 10px; font-family: var(--font-mono); color: #4ade80; white-space: pre-wrap; word-break: break-all; max-height: 44px; overflow: hidden; line-height: 1.4; margin-top: 4px; border-top: 1px dashed var(--border); padding-top: 4px; }

    /* ── 会话展开卡片 ─────────────────────────────────────────── */
    .session-expand-panel {
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-top: -1px;
      animation: slideDown 200ms ease both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .session-expand-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-expand-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      font-family: var(--font-sans);
    }
    .session-expand-body { max-height: 420px; overflow-y: auto; padding: 14px 16px; }
    .session-expand-body::-webkit-scrollbar { width: 4px; }
    .session-expand-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .turn-block { margin-bottom: 16px; }
    .turn-block:last-child { margin-bottom: 0; }
    .turn-user {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
    }
    .turn-avatar-u {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(139,0,0,0.2); border: 1px solid rgba(139,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #c0392b; flex-shrink: 0;
    }
    .turn-bubble-u {
      background: rgba(139,0,0,0.12); border: 1px solid rgba(139,0,0,0.25);
      border-radius: 10px 10px 10px 2px;
      padding: 7px 12px; font-size: 13px; color: var(--text);
      line-height: 1.5; max-width: 88%;
    }
    .turn-assistant {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
    }
    .turn-avatar-a {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #a78bfa; flex-shrink: 0;
    }
    .turn-bubble-a {
      background: var(--elevated); border: 1px solid var(--border-h);
      border-radius: 10px 10px 2px 10px;
      padding: 7px 12px; font-size: 13px; color: var(--text);
      line-height: 1.6; max-width: 88%;
    }
    .turn-tools { margin-left: 34px; }
    .turn-empty { font-family: var(--font-mono); font-size: 11px; color: var(--muted); padding: 4px 0 8px 34px; }
    .session-expand-footer {
      padding: 8px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--elevated); color: var(--muted); transition: all 150ms; font-family: var(--font-sans); }
    .btn-sm:hover { border-color: var(--border-h); color: var(--text); }
    .btn-sm-danger:hover { background: rgba(139,0,0,0.1); border-color: rgba(139,0,0,0.3); color: #c0392b; }
  </style>
</head>
<body class="glass-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content"></div>
</div>

<script>
(function() {
  var css = [
    '.sessions-list { width: 75%; max-width: none; margin: 0 auto; padding: 20px 0 32px; box-sizing: border-box; }',
    '.session-item { margin-bottom: 8px; }',
    '.session-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: var(--radius-md); background: var(--surface); border: 1px solid var(--border); transition: border-color 150ms, background 150ms; }',
    '.session-card:hover { border-color: var(--border-h); background: var(--elevated); }',
    '.session-card-info { flex: 1; min-width: 0; }',
    '.session-card-title { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }',
    '.session-card-meta { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }',
    '.session-card-rag { margin-top: 3px; font-size: 11px; font-family: var(--font-mono); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }',
    '.session-card-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 8px; }',
    '.session-btn { padding: 5px; border-radius: 6px; background: transparent; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 150ms; }',
    '.session-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; }',
    '.session-btn:hover { color: var(--text); background: var(--elevated); border-color: var(--border); }',
    '.session-btn.delete:hover { color: #c0392b; background: rgba(139,0,0,0.1); border-color: rgba(139,0,0,0.3); }',
    '.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 0; color: var(--muted); gap: 12px; }',
    '.empty-state svg { width: 40px; height: 40px; stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.4; }',
    '.empty-state p { font-size: 13px; margin: 0; }',
    '@media (max-width: 900px) { .sessions-list { width: 92%; } }',
  ].join('\n');
  var s = document.createElement('style');
  s.textContent = css;
  document.head.appendChild(s);
})();
</script>
<script>
// ── 内容模板 ──────────────────────────────────────────────────
var SESSIONS_CONTENT = [
  '<div class="sessions-list">',
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">',
      '<h2 style="font-size:15px;font-weight:500;color:var(--text)">会话历史</h2>',
      '<button class="btn" onclick="chatResetSession()" style="background:var(--elevated);border-color:var(--border-h);color:var(--text);padding:8px 16px;border-radius:8px">+ 新建会话</button>',
    '</div>',
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">',
      '<div style="position:relative;flex:1">',
        '<input type="text" class="search-input" id="session-search" placeholder="搜索会话（输入后回车或点 RAG 搜索）..." style="width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 80px 9px 14px;font-size:13px;font-family:var(--font-sans);outline:none;box-sizing:border-box;transition:border-color 150ms" onkeydown="if(event.key===\'Enter\')sessionDoSearch()">',
        '<button id="rag-search-btn" onclick="sessionDoSearch()" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:#7c3aed;border:none;border-radius:6px;color:#fff;padding:4px 10px;font-size:11px;font-family:var(--font-mono);cursor:pointer;white-space:nowrap">RAG 搜索</button>',
      '</div>',
      '<select class="form-select" id="session-sort" onchange="filterSessions()" style="width:140px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:var(--font-mono);padding:9px 12px;outline:none;cursor:pointer">',
        '<option value="updated">按更新时间</option>',
        '<option value="created">按创建时间</option>',
        '<option value="msgs">按消息数</option>',
      '</select>',
    '</div>',
    '<div id="rag-status" style="display:none;margin-bottom:12px;padding:8px 12px;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.25);border-radius:8px;font-size:12px;font-family:var(--font-mono);color:#a78bfa"></div>',
    '<div id="sessions-container"><div class="empty-state"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>正在加载会话...</p></div></div>',
  '</div>'
].join('');

// ── 页面 show ─────────────────────────────────────────────────
var _sessionsPageVisible = false;

function sessionsOnShow(savedState) {
  console.log('[H5] sessionsOnShow called, savedState=' + (savedState ? 'yes' : 'no'));
  _sessionsPageVisible = true;
  if (savedState && savedState.allSessions) {
    window._allSessions = savedState.allSessions;
    filterSessions();
  }
  loadSessions();
  // 监听页面可见性：切回时自动刷新
  document.addEventListener('visibilitychange', onSessionsVisibilityChange);
}

function onSessionsVisibilityChange() {
  if (document.visibilityState === 'visible' && _sessionsPageVisible) {
    loadSessions();
  }
}

// ── 页面 save ─────────────────────────────────────────────────
function sessionsOnSave() {
  return { allSessions: window._allSessions };
}

// ── 注册 ─────────────────────────────────────────────────────
registerSPA('/sessions', SESSIONS_CONTENT, sessionsOnShow, sessionsOnSave);

// ── 页面初始化 ────────────────────────────────────────────────
injectStyles();
initPage('/sessions');
initSPA('/sessions');

var _allSessions = [];
var _ragResults = null;  // RAG 搜索结果，null=未搜索状态

function loadSessions() {
  fetch('/api/sessions').then(function(r) { return r.ok ? r.json() : null; }).then(function(sessions) {
    if (!sessions) return;
    _allSessions = sessions;
    filterSessions();
    console.log('[H4] loadSessions SUCCESS count=' + sessions.length + ' first=' + (sessions[0] ? sessions[0].thread_id : 'none'));
  }).catch(function() {});
}

function sessionDoSearch() {
  var inp = document.getElementById('session-search');
  var btn = document.getElementById('rag-search-btn');
  var status = document.getElementById('rag-status');
  var keyword = inp ? inp.value.trim() : '';

  if (!keyword) {
    _ragResults = null;
    if (status) status.style.display = 'none';
    filterSessions();
    return;
  }

  if (btn) { btn.textContent = '搜索中...'; btn.disabled = true; }
  if (status) { status.textContent = 'RAG 搜索中...'; status.style.display = 'block'; }

  fetch('/api/sessions/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: keyword, top_k: 8, min_score: 0.0})
  }).then(function(r) { return r.ok ? r.json() : null;   }).then(function(data) {
    if (!data) return;
    // 将 RAG 结果映射为渲染格式
    var mapped = (data.results || []).map(function(r) {
      return {
        thread_id: r.thread_id,
        title: r.title || ('会话 ' + r.thread_id.slice(0, 8)),
        message_count: r.message_count || 0,
        updated_at: r.updated_at,
        _snippet: r.snippet || '',
        _score: r.score_percent || 0,
      };
    });
    // 语义检索 0 条时不要清空列表：退出 RAG 模式，仍显示本地会话（避免误以为「啥也没有」）
    if (!mapped.length) {
      _ragResults = null;
      if (status) status.textContent = '语义检索无匹配，已按右侧排序显示全部会话（' + data.elapsed_ms + 'ms）';
    } else {
      _ragResults = mapped;
      if (status) status.textContent = 'RAG 搜索完成，找到 ' + mapped.length + ' 条相关会话（' + data.elapsed_ms + 'ms）';
    }
    filterSessions();
  }).catch(function() {
    if (status) status.textContent = '搜索失败，请重试';
    if (btn) { btn.textContent = 'RAG 搜索'; btn.disabled = false; }
  }).finally(function() {
    if (btn) { btn.textContent = 'RAG 搜索'; btn.disabled = false; }
  });
}

function filterSessions() {
  var sortEl = document.getElementById('session-sort');
  var sortBy = sortEl ? sortEl.value : 'updated';

  var sessions;
  if (_ragResults !== null) {
    // RAG 搜索模式：直接用 RAG 结果，无需本地过滤
    sessions = _ragResults.slice();
  } else {
    // 普通模式：关键字过滤
    var searchEl = document.getElementById('session-search');
    var keyword = searchEl ? searchEl.value.toLowerCase().trim() : '';
    sessions = _allSessions.filter(function(s) {
      var title = s.title || ('会话 ' + s.thread_id.slice(0, 8));
      return !keyword || title.toLowerCase().indexOf(keyword) !== -1 || s.thread_id.toLowerCase().indexOf(keyword) !== -1;
    });
  }

  sessions.sort(function(a, b) {
    if (sortBy === 'created') {
      return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    } else if (sortBy === 'msgs') {
      return (b.message_count || 0) - (a.message_count || 0);
    } else {
      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
    }
  });

  renderSessions(sessions);
}

function renderSessions(sessions) {
  var container = document.getElementById('sessions-container');
  console.log('[H6] renderSessions called sessions.length=' + sessions.length + ' container=' + (!!container));
  if (!container) {
    console.log('[H6] sessions-container NOT FOUND in DOM, retrying in 100ms');
    setTimeout(function() { renderSessions(sessions); }, 100);
    return;
  }
  if (!sessions.length) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>暂无会话记录</p></div>';
    return;
  }
  container.innerHTML = sessions.map(function(s) {
    var ts = s.updated_at ? new Date(s.updated_at).toLocaleString('zh-CN', {month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'}) : '--';
    var title = s.title || ('会话 ' + s.thread_id.slice(0, 8));
    var expanded = window._expandedSession === s.thread_id;
    var ragMeta = '';
    if (s._score && s._snippet) {
      ragMeta = '<div class="session-card-rag" title="' + esc(s._snippet) + '"><span style="color:#a78bfa;font-size:10px">相关度 ' + s._score + '%</span> <span style="color:var(--muted);font-size:10px">' + esc(s._snippet.slice(0, 80)) + '</span></div>';
    }
    return '<div class="session-item" id="sess-' + esc(s.thread_id) + '">' +
      '<div class="session-card" onclick="toggleSession(\'' + esc(s.thread_id) + '\')" style="cursor:pointer">' +
        '<div class="session-card-info">' +
          '<div class="session-card-title">' + esc(title) + '</div>' +
          ragMeta +
          '<div class="session-card-meta">ID: ' + s.thread_id.slice(0, 12) + '... | ' + (s.message_count || 0) + ' 条消息 | ' + ts + '</div>' +
        '</div>' +
        '<div class="session-card-actions" onclick="event.stopPropagation()">' +
          '<button class="session-btn" onclick="chatJumpSession(\'' + esc(s.thread_id) + '\')" title="打开会话"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>' +
          '<button class="session-btn" onclick="sessionExport(\'' + esc(s.thread_id) + '\')" title="导出"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>' +
          '<button class="session-btn delete" onclick="chatDelSession(\'' + esc(s.thread_id) + '\')" title="删除"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
        '</div>' +
      '</div>' +
      (expanded ? '<div class="session-expand-panel" id="expand-' + esc(s.thread_id) + '"></div>' : '') +
    '</div>';
  }).join('');

  // 如果有展开的，加载其详情
  if (window._expandedSession) {
    loadSessionDetail(window._expandedSession);
  }
}

window._expandedSession = null;
window._sessionDetailCache = {};

function toggleSession(threadId) {
  if (window._expandedSession === threadId) {
    window._expandedSession = null;
  } else {
    window._expandedSession = threadId;
    loadSessionDetail(threadId);
  }
  filterSessions();
}

function loadSessionDetail(threadId) {
  var panel = document.getElementById('expand-' + threadId);
  if (!panel) return;
  panel.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:12px">正在加载对话详情...</div>';

  fetch('/api/session/' + threadId + '/detail').then(function(r) {
    return r.ok ? r.json() : null;
  }).then(function(data) {
    if (!data) return;
    window._sessionDetailCache[threadId] = data;
    renderSessionDetail(threadId, data);
  }).catch(function() {
    panel.innerHTML = '<div style="padding:16px;color:#f87171;font-size:12px">加载失败</div>';
  });
}

function renderSessionDetail(threadId, data) {
  var panel = document.getElementById('expand-' + threadId);
  if (!panel) return;

  var turns = data.turns || [];
  var toolEventsMap = {};
  (data.tool_events || []).forEach(function(te) {
    var key = te.turn;
    if (!toolEventsMap[key]) toolEventsMap[key] = te.tools || [];
    else toolEventsMap[key] = toolEventsMap[key].concat(te.tools || []);
  });

  if (!turns.length) {
    panel.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--font-mono)">暂无对话内容</div>';
    return;
  }

  var bodyHtml = turns.map(function(turn, idx) {
    var tools = toolEventsMap[idx] || turn.tools || [];
    var toolsHtml = '';
    if (tools.length) {
      var toolCards = tools.map(function(t) {
        var inputShort = truncate(String(t.input || ''), 120);
        var resultShort = truncate(String(t.result || ''), 120);
        return '<div class="tool-entry">' +
          '<div class="tool-entry-header">' +
            '<span class="tool-entry-name">' + esc(t.name || t.tool_name || '?') + '</span>' +
            '<span style="font-size:10px;font-family:var(--font-mono);color:var(--muted)">' +
              (t.type === 'tool_start' ? '开始' : '结果') + '</span>' +
          '</div>' +
          (inputShort ? '<div class="tool-entry-data" title="' + esc(String(t.input || '')) + '">' + esc(inputShort) + '</div>' : '') +
          (resultShort ? '<div class="tool-entry-result" title="' + esc(String(t.result || '')) + '">' + esc(resultShort) + '</div>' : '') +
        '</div>';
      }).join('');
      toolsHtml = '<div class="turn-tools">' +
        '<details class="qa-tool-block" open>' +
          '<summary class="qa-tool-header" style="cursor:pointer">' +
            '<span class="qa-label"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span>工具调用 (' + tools.length + ')</span></span>' +
            '<span class="qa-toggle">&#9660;</span>' +
          '</summary>' +
          '<div class="qa-tool-body">' + toolCards + '</div>' +
        '</details>' +
      '</div>';
    }

    return '<div class="turn-block">' +
      '<div class="turn-user">' +
        '<div class="turn-avatar-u">U</div>' +
        '<div class="turn-bubble-u">' + esc(turn.user || '') + '</div>' +
      '</div>' +
      '<div class="turn-assistant">' +
        '<div class="turn-avatar-a">A</div>' +
        '<div class="turn-bubble-a">' + esc(turn.assistant || '') + '</div>' +
      '</div>' +
      toolsHtml +
    '</div>';
  }).join('');

  panel.innerHTML =
    '<div class="session-expand-header">' +
      '<span class="session-expand-title">' + turns.length + ' 轮对话</span>' +
    '</div>' +
    '<div class="session-expand-body">' + bodyHtml + '</div>' +
    '<div class="session-expand-footer">' +
      '<button class="btn-sm" onclick="chatJumpSession(\'' + esc(threadId) + '\')">在对话页打开</button>' +
      '<button class="btn-sm btn-sm-danger" onclick="chatDelSession(\'' + esc(threadId) + '\')">删除会话</button>' +
    '</div>';
}

function truncate(s, max) {
  s = String(s);
  return s.length > max ? s.slice(0, max) + '…' : s;
}

function chatJumpSession(tid) {
  G.threadId = tid;
  localStorage.setItem('rag_tid', tid);
  navigateTo('/');
}

function sessionExport(tid) {
  var cache = window._sessionDetailCache[tid];
  if (cache && cache.turns) {
    exportFromCache(cache, tid);
    return;
  }
  fetch('/api/session/' + tid).then(function(r) { return r.ok ? r.json() : null; }).then(function(data) {
    if (!data || !data.messages) { toast('获取会话失败', 'error'); return; }
    exportFromCache(data, tid);
  }).catch(function() { toast('导出失败', 'error'); });
}

function exportFromCache(data, tid) {
  var turns = data.turns || [];
  var lines = ['# 会话记录', '---', ''];
  turns.forEach(function(turn, i) {
    lines.push('## 第 ' + (i + 1) + ' 轮');
    lines.push('**用户:** ' + (turn.user || ''));
    lines.push('');
    lines.push('**助手:** ' + (turn.assistant || ''));
    lines.push('');
    (turn.tools || []).forEach(function(t) {
      lines.push('> 工具 `' + (t.name || '') + '`: ' + truncate(String(t.result || ''), 200));
    });
    lines.push('');
  });
  var blob = new Blob(['\ufeff' + lines.join('\n')], {type: 'text/markdown;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '会话_' + tid.slice(0, 8) + '_' + new Date().toLocaleString('zh-CN').replace(/[\/:]/g, '-') + '.md';
  a.click();
  toast('导出成功');
}

function chatDelSession(tid) {
  if (!confirm('确定要删除这个会话吗？')) return;
  fetch('/api/chat/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({thread_id: tid})
  }).then(function() {
    toast('会话已删除');
    if (window._expandedSession === tid) window._expandedSession = null;
    loadSessions();
  }).catch(function() { toast('删除失败', 'error'); });
}

function chatResetSession() {
  _ragResults = null;
  var status = document.getElementById('rag-status');
  if (status) status.style.display = 'none';
  var inp = document.getElementById('session-search');
  if (inp) inp.value = '';
  G.threadId = 't_' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem('rag_tid', G.threadId);
  toast('新会话已创建');
  loadSessions();
}
</script>
