<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编排台 - Crayfish</title>
  <script src="/lib/shared.js"></script>
  <style>
    body { background: var(--noir-bg); }
    .orchestrate-page {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: grid;
      /* 中间「执行步骤」约为原 1fr:1fr 时中间列宽度的一半（与右侧 1:3） */
      grid-template-columns: 300px minmax(0, 1fr) minmax(0, 3fr);
      gap: 14px; padding: 16px 20px;
      box-sizing: border-box; overflow: hidden;
      align-content: stretch;
    }
    .orch-left {
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto; min-height: 0; padding-right: 2px;
    }
    .orch-left::-webkit-scrollbar { width: 3px; }
    .orch-left::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .orch-mid {
      display: flex; flex-direction: column; gap: 12px;
      min-height: 0; overflow: hidden;
    }
    .orch-mid::-webkit-scrollbar { width: 4px; }
    .orch-mid::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .orch-right {
      display: flex; flex-direction: column; gap: 12px;
      min-height: 0; overflow: hidden;
    }
    .orch-right::-webkit-scrollbar { width: 4px; }
    .orch-right::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .orch-card {
      background: var(--noir-card); border: 1px solid var(--noir-border);
      border-radius: 10px; padding: 14px;
    }
    .orch-card-title {
      font-family: 'Courier Prime', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--noir-dim); margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 1px solid var(--noir-border);
    }
    .orch-req-input {
      width: 100%; background: var(--noir-surface);
      border: 1px solid var(--noir-border); border-radius: 8px;
      color: var(--noir-text); font-family: var(--font-sans);
      font-size: 13px; padding: 10px 12px; resize: none;
      min-height: 80px; outline: none; transition: border-color 150ms;
      box-sizing: border-box;
    }
    .orch-req-input:focus { border-color: var(--noir-accent-hi); }
    .orch-req-input::placeholder { color: var(--noir-muted); }
    .orch-btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .orch-btn {
      flex: 1; padding: 9px 14px; border-radius: 8px; font-size: 13px;
      font-family: var(--font-sans); cursor: pointer;
      border: 1px solid var(--noir-border);
      background: var(--noir-surface); color: var(--noir-text);
      transition: all 150ms; display: flex;
      align-items: center; justify-content: center; gap: 6px;
    }
    .orch-btn:hover { border-color: var(--noir-border-hi); background: var(--noir-card); }
    .orch-btn.primary { background: rgba(139,0,0,0.2); border-color: rgba(139,0,0,0.5); color: #c0392b; }
    .orch-btn.primary:hover { background: rgba(139,0,0,0.3); }
    .orch-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .orch-btn.running { animation: orchPulse 1.5s ease-in-out infinite; }
    @keyframes orchPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .orch-btn.cancel-btn { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: #f87171; }
    .orch-btn.cancel-btn:hover { background: rgba(248,113,113,0.2); }
    .agent-toggle {
      display: flex; align-items: center; gap: 8px; padding: 7px 0;
      border-bottom: 1px solid rgba(42,42,42,0.6); cursor: pointer;
    }
    .agent-toggle:last-child { border-bottom: none; }
    .agent-toggle input[type=checkbox] { display: none; }
    .agent-check-box {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1px solid var(--noir-border-hi);
      background: var(--noir-surface); display: flex;
      align-items: center; justify-content: center;
      transition: all 150ms; flex-shrink: 0;
    }
    .agent-toggle input:checked ~ .agent-check-box { background: rgba(139,0,0,0.3); border-color: var(--noir-accent-hi); }
    .agent-toggle input:checked ~ .agent-check-box::after {
      content: ''; width: 6px; height: 10px;
      border: 2px solid #c0392b; border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px,-1px); display: block;
    }
    .agent-meta { display: flex; align-items: center; gap: 8px; }
    .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-dot.search { background: #4ade80; }
    .agent-dot.rag { background: #60a5fa; }
    .agent-dot.coder { background: #facc15; }
    .agent-name { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--noir-text); }
    .quality-row { display: flex; align-items: center; gap: 10px; }
    .quality-slider {
      flex: 1; -webkit-appearance: none; height: 4px;
      border-radius: 2px; background: var(--noir-border); outline: none;
    }
    .quality-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--noir-accent-hi); cursor: pointer;
    }
    .quality-val { font-family: 'Courier Prime', monospace; font-size: 13px; color: #c0392b; min-width: 32px; text-align: right; }
    .job-list {
      display: flex; flex-direction: column; gap: 6px;
      flex: 1; min-height: 0; overflow-y: auto;
    }
    .job-list::-webkit-scrollbar { width: 3px; }
    .job-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .job-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 8px; border: 1px solid var(--noir-border);
      background: var(--noir-surface); cursor: pointer; transition: all 150ms;
    }
    .job-item:hover { border-color: var(--noir-border-hi); }
    .job-item.selected { border-color: rgba(139,0,0,0.6); background: rgba(139,0,0,0.08); }
    .job-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .job-status-dot.pending   { background: #555; }
    .job-status-dot.running   { background: #c0392b; animation: pulseDot 1s infinite; }
    .job-status-dot.done      { background: #4ade80; }
    .job-status-dot.failed    { background: #f87171; }
    .job-status-dot.cancelled { background: #888; }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .job-info { flex: 1; min-width: 0; }
    .job-req-preview {
      font-family: 'Courier Prime', monospace; font-size: 11px;
      color: var(--noir-text); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .job-meta { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); margin-top: 2px; }
    .job-quality { font-family: 'Courier Prime', monospace; font-size: 11px; flex-shrink: 0; }
    .job-quality.high { color: #2ecc71; }
    .job-quality.fail { color: #f87171; }
    .job-empty { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-muted); text-align: center; padding: 20px 0; }
    .progress-header {
      flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: var(--noir-card);
      border: 1px solid var(--noir-border); border-radius: 10px;
    }
    .progress-label { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-dim); white-space: nowrap; }
    .progress-track { flex: 1; height: 6px; background: var(--noir-border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      transition: width 400ms ease;
    }
    .progress-fill.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .progress-pct { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--noir-text); min-width: 36px; text-align: right; }
    .step-badge {
      font-family: 'Courier Prime', monospace; font-size: 11px; color: #c0392b;
      background: rgba(139,0,0,0.12); border: 1px solid rgba(139,0,0,0.3);
      border-radius: 4px; padding: 2px 8px; white-space: nowrap;
    }
    .step-timeline {
      flex: 1; min-height: 0; background: var(--noir-card);
      border: 1px solid var(--noir-border); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .step-timeline-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--noir-border);
      cursor: pointer; flex-shrink: 0;
    }
    .step-timeline-header:hover { background: rgba(255,255,255,0.02); }
    .step-timeline-title { font-family: 'Courier Prime', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--noir-dim); }
    .step-timeline-toggle { font-size: 14px; color: var(--noir-dim); transition: transform 200ms; line-height: 1; }
    .step-timeline.collapsed .step-timeline-toggle { transform: rotate(-90deg); }
    .step-timeline.collapsed .step-list { display: none; }
    .step-list { overflow-y: auto; flex: 1; padding: 6px 0; min-height: 0; }
    .step-list::-webkit-scrollbar { width: 3px; }
    .step-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 14px; transition: background 150ms; }
    .step-item:hover { background: rgba(255,255,255,0.02); }
    .step-icon {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid;
      flex-shrink: 0; margin-top: 1px; display: flex;
      align-items: center; justify-content: center;
      font-size: 10px; font-family: 'Courier Prime', monospace;
    }
    .step-icon.pending { border-color: #444; background: transparent; color: #555; }
    .step-icon.active  { border-color: #c0392b; background: rgba(139,0,0,0.2); color: #c0392b; animation: stepPulse 1s infinite; }
    @keyframes stepPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .step-icon.done     { border-color: #4ade80; background: rgba(74,222,128,0.15); color: #4ade80; }
    .step-icon.fail     { border-color: #f87171; background: rgba(248,113,113,0.15); color: #f87171; }
    .step-content { flex: 1; min-width: 0; }
    .step-lane {
      font-family: 'Courier Prime', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--noir-muted); margin-bottom: 3px; opacity: 0.85;
    }
    .step-name { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--noir-text); }
    .step-desc { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-time { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); flex-shrink: 0; margin-top: 3px; }
    /* Logs: top 2/3 of right column */
    .orch-logs {
      flex: 2 1 0; display: flex; flex-direction: column;
      min-height: 0; overflow: hidden;
      background: var(--noir-card); border: 1px solid var(--noir-border);
      border-radius: 10px;
    }
    .orch-logs .orch-card-title {
      padding: 10px 14px 8px; margin-bottom: 0; border-bottom: 1px solid var(--noir-border);
    }
    .log-body { flex: 1; min-height: 0; padding: 6px 4px; overflow-y: auto; overflow-x: hidden; }
    .log-body::-webkit-scrollbar { width: 5px; }
    .log-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .log-entry {
      display: flex; gap: 10px; padding: 3px 0;
      font-family: 'Courier Prime', monospace; font-size: 11px;
      line-height: 1.5; animation: logSlide 200ms ease both;
    }
    @keyframes logSlide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
    .log-time   { color: var(--noir-muted); flex-shrink: 0; font-size: 10px; }
    .log-agent  { flex-shrink: 0; min-width: 72px; font-size: 10px; }
    .log-agent.search_worker  { color: #4ade80; }
    .log-agent.rag_worker    { color: #60a5fa; }
    .log-agent.coder         { color: #facc15; }
    .log-agent.supervisor     { color: #c0392b; }
    .log-agent.self_healer   { color: #facc15; }
    .log-agent.system         { color: var(--noir-dim); }
    .log-msg { color: var(--noir-text); word-break: break-all; font-size: 11px; }
    /* 评价 + 输出：底部一行两列（左评价 / 右产出文件夹） */
    .orch-bottom-row {
      flex: 1 1 0;
      display: flex;
      flex-direction: row;
      gap: 12px;
      min-height: 0;
      align-items: stretch;
    }
    .orch-eval-col, .orch-output-col {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .orch-eval-col .orch-card.orch-eval {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .orch-output-col .orch-card.orch-output {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Eval: bottom 1/3 right column */
    .orch-eval { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .eval-meta {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--noir-border);
      font-family: 'Courier Prime', monospace; font-size: 10px;
      color: var(--noir-muted); line-height: 1.6; display: none;
    }
    .eval-meta.visible { display: block; }
    .resultquality-row { display: flex; align-items: center; gap: 8px; }
    .quality-bar-wrap { flex: 1; height: 6px; background: var(--noir-border); border-radius: 3px; overflow: hidden; }
    .quality-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: width 600ms ease; }
    .quality-bar.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .quality-score-label { font-family: 'Courier Prime', monospace; font-size: 14px; color: #c0392b; font-weight: 700; }
    .quality-score-label.high { color: #2ecc71; }
    .result-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
      border-radius: 4px; font-family: 'Courier Prime', monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .result-badge.pass { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }
    .result-badge.fail { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #c0392b; }
    /* Output: 右侧列内卡片 */
    .orch-output { flex: 1 1 0; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .orch-files-container {
      flex: 1 1 0;
      min-height: 120px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 2px 0;
    }
    .orch-files-container::-webkit-scrollbar { width: 4px; }
    .orch-files-container::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .orch-files-hint {
      margin: 0; padding: 12px 10px;
      font-family: 'Courier Prime', monospace; font-size: 11px;
      color: var(--noir-muted); line-height: 1.55;
      background: rgba(0,0,0,0.15);
      border: 1px dashed var(--noir-border);
      border-radius: 8px;
    }
    .orch-files-hint code { font-size: 10px; color: var(--noir-dim); }
    .artifact-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--noir-surface);
      border: 1px solid var(--noir-border); border-radius: 8px;
      cursor: pointer; transition: border-color 160ms, background 160ms, transform 160ms;
      min-height: 60px;
    }
    .orch-output .artifact-card {
      flex: 0 0 auto;
      margin-top: 8px;
    }
    .artifact-card:hover { border-color: var(--noir-border-hi); background: rgba(255,255,255,0.03); }
    .artifact-card:active { transform: scale(0.99); }
    .artifact-card.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
    .artifact-icon {
      width: 38px; height: 38px; border-radius: 8px;
      background: rgba(139,0,0,0.15); border: 1px solid rgba(139,0,0,0.35);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .artifact-icon svg { width: 18px; height: 18px; stroke: #c0392b; fill: none; stroke-width: 1.5; }
    .artifact-text { flex: 1; min-width: 0; }
    .artifact-title { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--noir-text); }
    .artifact-preview {
      font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted);
      margin-top: 4px; line-height: 1.45; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .artifact-chevron { flex-shrink: 0; color: var(--noir-dim); font-size: 18px; line-height: 1; }
    /* Drawer */
    .orch-drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    .orch-drawer-backdrop.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .orch-drawer {
      position: fixed; top: 0; right: 0;
      width: min(50vw, 900px); min-width: 320px;
      height: 100%; max-height: 100dvh;
      background: var(--noir-card); border-left: 1px solid var(--noir-border);
      box-shadow: -12px 0 40px rgba(0,0,0,0.45); z-index: 201;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .orch-drawer.open { transform: translateX(0); }
    .orch-drawer-header {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--noir-border);
    }
    .orch-drawer-title { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--noir-text); }
    .orch-drawer-actions { display: flex; align-items: center; gap: 8px; }
    .orch-drawer-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--noir-border);
      background: var(--noir-surface); color: var(--noir-text);
      font-size: 12px; font-family: var(--font-sans); cursor: pointer;
      transition: border-color 150ms, background 150ms;
    }
    .orch-drawer-btn:hover { border-color: var(--noir-border-hi); }
    .orch-drawer-close {
      width: 32px; height: 32px; border-radius: 6px; border: none;
      background: transparent; color: var(--noir-dim); font-size: 20px;
      line-height: 1; cursor: pointer;
    }
    .orch-drawer-close:hover { color: var(--noir-text); background: rgba(255,255,255,0.05); }
    .orch-drawer-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 18px 24px; }
    .orch-drawer-body::-webkit-scrollbar { width: 6px; }
    .orch-drawer-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .orch-drawer-pre {
      margin: 0; font-family: 'Courier Prime', monospace; font-size: 12px;
      line-height: 1.65; color: var(--noir-text);
      white-space: pre-wrap; word-break: break-word;
    }
    /* 文件输出区域 */
    .orch-files-section {
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--noir-border);
    }
    .orch-files-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .orch-files-title {
      font-family: 'Courier Prime', monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--noir-dim);
    }
    .orch-files-actions { display: flex; gap: 6px; }

    /* 文件夹卡片 */
    .orch-folder-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; margin-bottom: 8px;
      background: rgba(139,0,0,0.06); border: 1px solid rgba(139,0,0,0.25);
      border-radius: 8px; cursor: pointer;
      transition: all 180ms;
      user-select: none;
    }
    .orch-folder-card:hover {
      background: rgba(139,0,0,0.10); border-color: rgba(139,0,0,0.5);
    }
    .orch-folder-card.open {
      background: rgba(139,0,0,0.10); border-color: rgba(139,0,0,0.45);
      border-bottom-left-radius: 0; border-bottom-right-radius: 0;
      margin-bottom: 0;
    }
    .orch-folder-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(139,0,0,0.18); border: 1px solid rgba(139,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .orch-folder-info { flex: 1; min-width: 0; }
    .orch-folder-name {
      font-family: 'Courier Prime', monospace; font-size: 13px;
      font-weight: 700; color: var(--noir-text);
    }
    .orch-folder-meta {
      font-family: 'Courier Prime', monospace; font-size: 10px;
      color: var(--noir-muted); margin-top: 3px;
    }
    .orch-folder-chevron {
      font-size: 18px; color: var(--noir-dim);
      transition: transform 200ms;
      flex-shrink: 0;
    }
    .orch-folder-card.open .orch-folder-chevron { transform: rotate(90deg); }

    /* 文件列表（展开区域）*/

      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px 9px 62px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 120ms;
    }
    .orch-file-item:last-child { border-bottom: none; }
    .orch-file-item:hover { background: rgba(255,255,255,0.04); }

    .orch-file-icon.doc      { background: rgba(251,146,60,0.18); }
    .orch-file-icon.report   { background: rgba(251,113,133,0.18); }

      padding: 6px 14px 4px 62px;
      font-family: 'Courier Prime', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #555; border-bottom: 1px solid rgba(255,255,255,0.05);

    .orch-file-info { flex: 1; min-width: 0; }
    .orch-file-name {
      font-family: 'Courier Prime', monospace; font-size: 12px;
      color: var(--noir-text); font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    .orch-file-meta {
      font-family: 'Courier Prime', monospace; font-size: 10px;
      color: var(--noir-muted); margin-top: 2px;

    .orch-file-btns { display: flex; gap: 5px; flex-shrink: 0; }

      padding: 4px 9px; border-radius: 5px; border: 1px solid var(--noir-border);

      font-size: 10px; font-family: var(--font-sans); cursor: pointer;

    .orch-file-btn.preview:hover { background: rgba(139,0,0,0.15); }
    /* 文件预览模态框 */
    .orch-file-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300;

      opacity: 0; visibility: hidden; transition: opacity 200ms;
    }
    .orch-file-modal-backdrop.open { opacity: 1; visibility: visible; }
    .orch-file-modal {
      width: min(85vw, 1100px); max-height: 88vh;
      background: var(--noir-card); border: 1px solid var(--noir-border);
      border-radius: 12px; display: flex; flex-direction: column;

    .orch-file-modal-header {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 14px 18px;

      font-family: 'Courier Prime', monospace; font-size: 13px;

      flex: 1; min-height: 0; overflow: auto; padding: 0;

    .orch-file-modal-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .orch-file-modal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* 语法高亮代码区 */

      display: flex; align-items: flex-start;

    .orch-code-linenums {

      font-family: 'Courier Prime', monospace; font-size: 12px;

      background: rgba(0,0,0,0.2);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .orch-code-content {
      flex: 1; padding: 16px 20px;
      font-family: 'Courier Prime', 'Fira Code', monospace; font-size: 12px;
      line-height: 1.65; color: #d4d4d4;
      white-space: pre-wrap; word-break: break-all;
      overflow: visible;

    /* Markdown 预览 */

      background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px;
    }
    .orch-md-preview pre { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; overflow-x: auto; }

    .orch-md-preview table { border-collapse: collapse; width: 100%; }
    .orch-md-preview td,.orch-md-preview th {
      border: 1px solid #333; padding: 6px 10px; font-size: 12px;
    }
    .orch-file-modal-close {
      width: 32px; height: 32px; border-radius: 6px; border: none;

    .back-row { display: flex; align-items: center; }

      display: flex; align-items: center; gap: 6px; padding: 5px 12px;

var _selectedJobId = null;
var _streamReaders = {};

var STEP_TEMPLATES = {
  phase_zhongshu: { lane: '三省 · 制敕', name: '中书省 · 需求制敕', desc: '承接需求、制敕纲领（Chief / Product 对齐）' },

  phase_shangshu: { lane: '三省 · 牒发', name: '尚书省 · 牒发六曹', desc: '总领执行、牒发六曹工单（Eng 调度）' },

};

function _orchHasStepId(sid) {
  for (var i = 0; i < _steps.length; i++) { if (_steps[i].id === sid) return true; }
  return false;
}

function _orchHasWorkerKind(enabledAgents, participants, wk) {
  var p = participants || [];
  for (var i = 0; i < p.length; i++) {
    if (p[i].worker_kind === wk) return true;
  }
  var ea = enabledAgents || [];
  for (var j = 0; j < ea.length; j++) {
    var id = String(ea[j]).toLowerCase();
    if (wk === 'search_worker') {
      if (id.indexOf('search') !== -1 && id.indexOf('rag') === -1) return true;
    } else if (wk === 'rag_worker') {
      if (id.indexOf('rag') !== -1) return true;
    } else if (wk === 'coder') {
      if (id.indexOf('coder') !== -1) return true;
    }
  }
  return false;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _orchDrawerEsc(e) {
  if (e.key !== 'Escape') return;
  var dr = document.getElementById('orch-drawer');
  if (dr && dr.classList.contains('open')) closeResultDrawer();
}

function orchestrateOnShow() {
  refreshJobList();
  if (!_listPollTimer) {
    _listPollTimer = setInterval(refreshJobList, 3000);
  }
  if (!_orchEscBound) {
    document.addEventListener('keydown', _orchDrawerEsc);
    _orchEscBound = true;
  }
  loadOrchAgents();
  // 深链：?job=job_xxx
  var params = new URLSearchParams(window.location.search);
  var deepJob = params.get('job');
  if (deepJob) {
    setTimeout(function() { selectJob(deepJob); }, 300);
  }
}

function orchestrateOnSave() { return null; }

registerSPA('/orchestrate', ORCHESTRATE_CONTENT, orchestrateOnShow, orchestrateOnSave);
injectStyles();
initPage('/orchestrate');
initSPA('/orchestrate');

var qualSlider = document.getElementById('orch-quality');
if (qualSlider) qualSlider.addEventListener('input', function() {
  var v = document.getElementById('orch-quality-val');
  if (v) v.textContent = parseFloat(this.value).toFixed(1);
});

var _orchAgents = [];

function loadOrchAgents() {
  fetch('/api/agents').then(function(r) { return r.ok ? r.json() : null; }).then(function(agents) {
    if (!agents) return;
    _orchAgents = agents.filter(function(a) { return a.is_active; });
    renderOrchAgentList(_orchAgents);
  }).catch(function() {});
}

function renderOrchAgentList(agents) {
  var container = document.getElementById('orch-agent-list');
  var statusEl = document.getElementById('agent-list-status');
  if (!container) return;
  if (statusEl) statusEl.textContent = agents.length + ' 个在线';

  // worker_kind -> dot color / name
  var kindMeta = {
    'search_worker': { cls: 'search', label: 'Search Worker' },
    'rag_worker':    { cls: 'rag',    label: 'RAG Worker' },
    'coder':         { cls: 'coder',  label: 'Coder Worker' },
  };

  var sorted = agents.slice().sort(function(a, b) {
    if (a.id === 'agent_main') return -1;
    if (b.id === 'agent_main') return 1;
    return 0;
  });

  container.innerHTML = sorted.map(function(a) {
    var meta = kindMeta[a.worker_kind] || { cls: 'generic', label: a.role || a.name };
    var dotCls = meta.cls;
    var label = a.name || a.id;
    var isChief = a.id === 'agent_main' || String(a.role || '').toLowerCase() === 'chief';
    // 内置三 Worker 默认勾选；Chief Coordinator 必选且不可取消
    var isBuiltIn = !!a.worker_kind;
    var checked = isBuiltIn || isChief ? ' checked' : '';
    var disabled = isChief ? ' disabled' : '';
    var chiefTag = isChief ? ' <span style="font-size:9px;color:var(--noir-muted)">(必选·总协调)</span>' : '';

function getSelectedAgentIds() {
  var ids = [];
  var chiefId = null;
  _orchAgents.forEach(function(a) {
    if (a.id === 'agent_main' || String(a.role || '').toLowerCase() === 'chief') chiefId = a.id;
  });
  var checkboxes = document.querySelectorAll('#orch-agent-list input[data-agent-id]');
  checkboxes.forEach(function(cb) {
    var aid = cb.dataset.agentId;
    if (cb.checked || (cb.disabled && aid === 'agent_main')) {
      if (ids.indexOf(aid) === -1) ids.push(aid);
    }
  });
  if (chiefId && ids.indexOf(chiefId) === -1) ids.unshift(chiefId);
  if (chiefId) {
    ids = ids.filter(function(x) { return x !== chiefId; });
    ids.unshift(chiefId);
  }
  // 若未选任何执行 Agent，默认选内置三 Worker
  if (ids.length <= (chiefId ? 1 : 0)) {
    var extras = _orchAgents.filter(function(a) { return !!a.worker_kind; }).map(function(a) { return a.id; });
    extras.forEach(function(id) { if (ids.indexOf(id) === -1) ids.push(id); });

  return ids;
}

function buildStepList(enabledAgents, job) {
  var parts = (job && job.participants) ? job.participants : [];
  _steps = [];
  function addTmpl(id) {
    var t = STEP_TEMPLATES[id];
    if (!t) return;
    _steps.push({ id: id, lane: t.lane, name: t.name, desc: t.desc, status: 'pending' });
  }
  addTmpl('phase_zhongshu');
  addTmpl('phase_menxia');
  addTmpl('phase_shangshu');
  if (_orchHasWorkerKind(enabledAgents, parts, 'search_worker')) addTmpl('search_worker');
  if (_orchHasWorkerKind(enabledAgents, parts, 'rag_worker')) addTmpl('rag_worker');
  if (_orchHasWorkerKind(enabledAgents, parts, 'coder')) addTmpl('coder');

  // 动态渲染自定义 agent（"杂曹"槽位）：id = worker_kind，同时存储 agentId 供事件路由
  var seenKinds = new Set(['search_worker', 'rag_worker', 'coder']);
  parts.forEach(function(p) {
    var wk = p.worker_kind;
    if (!wk || seenKinds.has(wk)) return;
    seenKinds.add(wk);
    _steps.push({
      id: wk,
      lane: '六部 · 杂曹',
      name: p.name || wk,
      desc: p.description || ('执行 ' + wk + ' 任务'),
      status: 'pending',
      agentId: p.id,
    });
  });

  addTmpl('quality_eval');
  addTmpl('self_heal');
  addTmpl('final_result');
  _stepIdx = 0;
  renderStepList();
}

function updateStepStatus(eventType, newStatus) {
  var idx = -1;
  for (var i = 0; i < _steps.length; i++) { if (_steps[i].id === eventType) { idx = i; break; } }
  if (idx === -1) return;
  _steps[idx].status = newStatus;
  if (newStatus === 'active') _stepIdx = idx;
  renderStepList();
  updateProgress();
}

function updateProgress() {
  var done = 0;
  for (var i = 0; i < _steps.length; i++) { if (_steps[i].status === 'done') done++; }
  var pct = _steps.length ? Math.round((done / _steps.length) * 100) : 0;
  var fill = document.getElementById('progress-fill');
  var pctEl = document.getElementById('progress-pct');
  var badge = document.getElementById('step-badge');
  if (fill) { fill.style.width = pct + '%'; fill.className = 'progress-fill' + (pct >= 100 ? ' high' : ''); }
  if (pctEl) pctEl.textContent = pct + '%';
  if (badge && _steps[_stepIdx]) badge.textContent = _steps[_stepIdx].name;
}

function renderStepList() {
  var listEl = document.getElementById('step-list');

  if (!listEl) return;
  if (!_steps.length) {
    listEl.innerHTML = '';
    if (emptyEl) emptyEl.style.display = '';
    return;
  }
  if (emptyEl) emptyEl.style.display = 'none';
  listEl.innerHTML = '';
  for (var i = 0; i < _steps.length; i++) {
    var step = _steps[i];
    var icon = step.status === 'done' ? '&#10003;' :
               step.status === 'active' ? '&#8226;' :
               step.status === 'fail' ? '&#10007;' : String(i + 1);
    var item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML =
      '<div class="step-icon ' + step.status + '">' + icon + '</div>' +
      '<div class="step-content">' +
        (step.lane ? '<div class="step-lane">' + esc(step.lane) + '</div>' : '') +
        '<div class="step-name">' + esc(step.name) + '</div>' +
        '<div class="step-desc">' + esc(step.desc) + '</div>' +
      '</div>' +
      '<div class="step-time" id="step-time-' + i + '"></div>';
    listEl.appendChild(item);
  }
}

function fetchJobAndStream(jobId) {
  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jobId))
    .then(function(r) { return r.json(); })
    .then(function(job) {
      // #region agent log — API 回调最开头（零分支）
      fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6ba534'},body:JSON.stringify({sessionId:'6ba534',hypothesisId:'H3',location:'orchestrate.html:fetchThen',message:'fetchThen_top',data:{jobId:String(jobId||''),status:job.status,hasResult:!!job.result,nFiles:job.result&&Array.isArray(job.result.files)?job.result.files.length:typeof job.result&&job.result!==null?'obj_'+Object.keys(job.result||{}).length:'none'},timestamp:Date.now()})}).catch(function(){});
      // #endregion
      if (job.error) { console.error(job.error); return; }
      var ph = document.getElementById('progress-header');
      if (ph) ph.style.display = '';
      buildStepList(job.enabled_agents || [], job);
      if (_orchHasStepId('phase_zhongshu')) updateStepStatus('phase_zhongshu', 'active');
      if (job.events && job.events.length) {
        for (var i = 0; i < job.events.length; i++) handleJobEvent(jobId, job.events[i].type, job.events[i].data);
      }
      // #region agent log — 诊断 API 返回的 job 完整结构
      fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6ba534'},body:JSON.stringify({sessionId:'6ba534',hypothesisId:'H3',location:'orchestrate.html:fetchJobThen',message:'API job payload',data:{status:job.status,hasResult:!!job.result,resultKeys:job.result?Object.keys(job.result):[],nFiles:job.result&&job.result.files?(Array.isArray(job.result.files)?job.result.files.length:'notArray_'+typeof job.result.files):'noFiles',jobId:jobId},timestamp:Date.now()})}).catch(function(){});
      // #endregion

      // 对已完成任务：直接调用 onFinalResult（不管 SSE 是否已关闭）
      if (job.status === 'done' && job.result) {
        // #region agent log
        var _jr = job.result;
        fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6ba534'},body:JSON.stringify({sessionId:'6ba534',hypothesisId:'H3',location:'orchestrate.html:fetchJobAndStream',message:'before onFinalResult(job.result)',data:{keys:Object.keys(_jr||{}),filesLen:Array.isArray(_jr&&_jr.files)?_jr.files.length:String(typeof(_jr&&_jr.files))},timestamp:Date.now()})}).catch(function(){});
        // #endregion
        onFinalResult(job.result);
      }
      if (job.status === 'failed')                  onJobDone('failed');
      if (job.status === 'cancelled')                onJobDone('cancelled');
      if (job.status === 'pending' || job.status === 'running') openJobStream(jobId);
    })
    .catch(function(err) { console.error('Fetch job error', err); });
}

function openJobStream(jobId) {
  var ac = new AbortController();
  _streamReaders[jobId] = { cancelFn: function() { ac.abort(); } };

  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jobId) + '/events', { signal: ac.signal })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      pump(jobId, resp.body.getReader());
    })
    .catch(function(err) {
      if (err.name === 'AbortError') return;
      console.error('Job stream error', err);
      var _retryTimer = setTimeout(function() {
        if (_selectedJobId === jobId) fetchJobAndStream(jobId);
      }, 2000);
    });

  function pump(jid, rdr) {
    var decoder = new TextDecoder();
    var buffer = '';
    (function tick() {
      if (!rdr) return;
      rdr.read().then(function(result) {
        if (result.done) { onStreamDone(jid); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          if (line.substring(0, 6) === 'data: ') {
            var payload = line.substring(6);
            try {
              var data = JSON.parse(payload);
              handleJobEvent(jid, data.type || '?', data.data || data);
            } catch(e) { console.error('Parse SSE data error', e, payload); }
          }
        }
        tick();
      }).catch(function(err) { console.error('Pump error', err); onStreamDone(jid); });
    })();
  }

  function onStreamDone(jid) {
    if (_streamReaders[jid]) delete _streamReaders[jid];
    refreshJobList();
    if (_selectedJobId === jid) {
      setTimeout(function() { fetchJobAndStream(jid); }, 1500);
    }
  }
}

function handleJobEvent(jobId, eventType, data) {
  if (jobId !== _selectedJobId) return;
  var d = (data && data.data !== undefined) ? data.data : (data || {});
  // #region agent log
  if (eventType === 'final_result') {
    fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6ba534'},body:JSON.stringify({sessionId:'6ba534',hypothesisId:'H4',location:'orchestrate.html:handleJobEvent',message:'final_result unwrap',data:{topKeys:Object.keys(data||{}),dKeys:Object.keys(d||{}),dFilesLen:Array.isArray(d&&d.files)?d.files.length:'na'},timestamp:Date.now()})}).catch(function(){});
  }
  // #endregion
  switch (eventType) {
    case 'supervisor_plan':    onSupervisorPlan(d);   break;
    case 'worker_start':      onWorkerStart(d);     break;
    case 'worker_progress':   onWorkerProgress(d);  break;
    case 'worker_done':        onWorkerDone(d);       break;
    case 'worker_rejected':    onWorkerRejected(d);   break;
    case 'quality_score':      onQualityScore(d);     break;
    case 'self_healing':     onSelfHealing(d);      break;
    case 'loop_warning':       onLoopWarning(d);      break;
    case 'human_intervention': onHumanIntervention(d); break;
    case 'final_result':     onFinalResult(d);      break;
    case 'error':            onOrchError(d);        break;
    case 'done':             onJobDone(d.status || 'done'); break;
  }
}

function onSupervisorPlan(d) {
  hideLogEmpty();
  if (_orchHasStepId('phase_zhongshu')) updateStepStatus('phase_zhongshu', 'done');
  if (_orchHasStepId('phase_menxia')) {
    updateStepStatus('phase_menxia', 'active');
    updateStepStatus('phase_menxia', 'done');
  }
  if (_orchHasStepId('phase_shangshu')) updateStepStatus('phase_shangshu', 'active');
  appendLog('supervisor', '\u6b63\u5728\u62c6\u89e3\u4efb\u52a1...');
  if (d.tasks && d.tasks.length) {
    for (var i = 0; i < d.tasks.length; i++) {
      var t = d.tasks[i];
      var short = (t.assigned_agent || '').replace('_worker', '') || '?';
      appendLog('supervisor', '\u8ba1\u5212: ' + t.description);
      appendLog('system', '  \u2192 ' + short + ' (' + t.task_id + ')');
    }
  }
}

function onWorkerStart(d) {
  var agentRaw = d.agent || '';
  var tid = d.task_id || '';
  if (agentRaw === 'supervisor' && tid === 'parallel_dispatch') {
    if (_orchHasStepId('phase_shangshu')) updateStepStatus('phase_shangshu', 'done');
    appendLog('supervisor', '\u5f00\u59cb\u5e76\u884c\u6d3e\u9063: ' + (d.task_description || ''));
    return;
  }
  if (_orchHasStepId('phase_shangshu') && agentRaw !== 'supervisor') {
    updateStepStatus('phase_shangshu', 'done');
  }
  var key = _resolveStepKey(agentRaw);
  if (key !== 'system' && key !== 'supervisor') updateStepStatus(key, 'active');
  appendLog(key === 'system' ? 'system' : key, '\u5f00\u59cb\u6267\u884c: ' + (d.task_description || d.description || ''));
}

function onWorkerProgress(d) {
  var key = _resolveStepKey(d.agent);
  appendLog(key, d.message || '\u8fdb\u884c\u4e2d...');
}

function onWorkerDone(d) {
  var key = _resolveStepKey(d.agent);
  var score = parseFloat(d.quality_score || 0);
  if (key !== 'system') updateStepStatus(key, 'done');
  appendLog(key, '\u5b8c\u6210 (\u8d28\u91cf: ' + score.toFixed(1) + '/10)');
}

function onWorkerRejected(d) {
  var key = _resolveStepKey(d.agent);
  if (key !== 'system') updateStepStatus(key, 'fail');
  appendLog(key, '\u88ab\u9a73\u56de: ' + (d.reason || '\u672a\u77e5\u539f\u56e0'));
}

function onSelfHealing(d) {
  updateStepStatus('self_heal', 'active');
  appendLog('self_healer', '\u81ea\u4fee\u590d #' + (d.attempt || '?') + ': ' + (d.reason || ''));
}

function onQualityScore(d) {
  updateStepStatus('quality_eval', 'active');
  appendLog('system', '\u6574\u4f53\u8d28\u91cf: ' + parseFloat(d.score || 0).toFixed(1) + '/10 ' + (d.note || ''));
  updateStepStatus('quality_eval', 'done');
}

function onLoopWarning(d) {
  appendLog('system', '\u5faa\u73af\u8b66\u544a: ' + (d.loop_count || 0) + ' \u6b21');
}

function onHumanIntervention(d) {

  var evalMeta = document.getElementById('eval-meta');
  var elLoop = document.getElementById('eval-loop');
  var elHeal = document.getElementById('eval-heal');
  if (evalMeta) evalMeta.classList.add('visible');
  if (elLoop) elLoop.textContent = (d.loop_count !== undefined && d.loop_count !== null) ? String(d.loop_count) : '\u2014';
  if (elHeal) elHeal.textContent = (d.healing_attempts !== undefined && d.healing_attempts !== null) ? String(d.healing_attempts) : '\u2014';

  updateStepStatus('final_result', 'done');
  onJobDone('done');
  refreshJobList();

  // ── 渲染文件列表区域 ─────────────────────────────────────────────
  _renderFileList(d, _selectedJobId);
}

// ── 文件列表渲染 ──────────────────────────────────────────────────────────
var _currentModalFile = null; // 当前预览的文件信息
var _expandedFolder = null;   // 当前展开的文件夹 plan_id

function _renderFileList(d, jobId) {
  var files = d.files || [];
  var outputDir = d.output_dir || '';
  var planId = d.plan_id || '';
  var area = document.getElementById('orch-files-area');
  if (!area) return;

  // #region agent log
  fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6ba534'},body:JSON.stringify({sessionId:'6ba534',hypothesisId:'H4',location:'orchestrate.html:_renderFileList',message:'render file list',data:{jobId:String(jobId||''),n:files.length,dHasFiles:Object.prototype.hasOwnProperty.call(d||{},'files'),rawFilesType:typeof(d&&d.files)},timestamp:Date.now()})}).catch(function(){});
  // #endregion

  if (!files || files.length === 0) {
    area.innerHTML = '<p class="orch-files-hint" id="orch-files-placeholder">\u4efb\u52a1\u5b8c\u6210\u540e\uff0c<code>outputs/&lt;plan_id&gt;/</code> \u4e0b\u7684\u4ea7\u51fa\u6587\u4ef6\u5c06\u663e\u793a\u5728\u6b64\uff0c\u53ef\u5c55\u5f00\u9884\u89c8 .py / .html / .md \u7b49\u3002</p>';
    return;
  }

  // ── 全局操作栏 ──────────────────────────────────────────────────────
  var html = '<div class="orch-files-section">';
  html += '<div class="orch-files-header">';
  html += '<span class="orch-files-title">&#x1F4C2; 产出文件夹</span>';
  html += '<div class="orch-files-actions">';
  html += '<button type="button" class="orch-file-btn" onclick="downloadAllFiles(\'' + encodeURIComponent(jobId || '') + '\')">打包下载</button>';
  if (outputDir) {
    html += '<button type="button" class="orch-file-btn" onclick="openOutputFolder(\'' + encodeURIComponent(outputDir) + '\')">打开目录</button>';
  }
  html += '</div></div>';

  // ── 文件夹卡片 ───────────────────────────────────────────────────────
  // 统计各类型文件
  var codeFiles = files.filter(function(f){ return f.file_type === 'code'; });
  var htmlFiles = files.filter(function(f){ return f.file_type === 'html'; });
  var mdFiles   = files.filter(function(f){ return f.file_type === 'markdown'; });
  var dataFiles = files.filter(function(f){ return f.file_type === 'data'; });
  var otherFiles = files.filter(function(f){
    return !['code','html','markdown','data'].includes(f.file_type);
  });

  var folderName = 'outputs/' + (planId || jobId || 'result');
  var totalSize = files.reduce(function(s,f){ return s + (f.size_bytes || 0); }, 0);

  html += '<div class="orch-folder-card" id="orch-folder-card" ';
  html += 'onclick="toggleFolderCard()" role="button" tabindex="0" ';
  html += 'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleFolderCard();}">';
  html += '<div class="orch-folder-icon">&#x1F4C1;</div>';
  html += '<div class="orch-folder-info">';
  html += '<div class="orch-folder-name">' + _escHtml(folderName) + '</div>';
  var metaParts = [files.length + ' 个文件'];
  if (codeFiles.length > 0) metaParts.push(codeFiles.length + ' 代码');
  if (htmlFiles.length > 0) metaParts.push(htmlFiles.length + ' 网页');
  if (mdFiles.length > 0)   metaParts.push(mdFiles.length + ' 文档');
  if (dataFiles.length > 0) metaParts.push(dataFiles.length + ' 数据');
  html += '<div class="orch-folder-meta">' + metaParts.join(' \u00B7 ') + ' \u00B7 ' + _formatSize(totalSize) + '</div>';
  html += '</div>';
  html += '<div class="orch-folder-chevron" id="orch-folder-chevron">&#8250;</div>';
  html += '</div>';

  // ── 文件列表（折叠区）────────────────────────────────────────────────
  html += '<div class="orch-file-list" id="orch-file-list" style="display:none;">';

  // 代码文件区
  if (codeFiles.length > 0) {
    html += '<div class="orch-file-group-label">\u2699 代码文件</div>';
    for (var i = 0; i < codeFiles.length; i++) {
      html += _renderFileItem(codeFiles[i], jobId, true);
    }
  }
  // HTML 文件区
  if (htmlFiles.length > 0) {
    html += '<div class="orch-file-group-label">\u2699 网页 / 前端</div>';
    for (var i = 0; i < htmlFiles.length; i++) {
      html += _renderFileItem(htmlFiles[i], jobId, true);
    }
  }
  // Markdown 文件区
  if (mdFiles.length > 0) {
    html += '<div class="orch-file-group-label">\u2699 文档</div>';
    for (var i = 0; i < mdFiles.length; i++) {
      html += _renderFileItem(mdFiles[i], jobId, true);
    }
  }
  // 数据文件区
  if (dataFiles.length > 0) {
    html += '<div class="orch-file-group-label">\u2699 数据文件</div>';
    for (var i = 0; i < dataFiles.length; i++) {
      html += _renderFileItem(dataFiles[i], jobId, true);
    }
  }
  // 其他文件
  if (otherFiles.length > 0) {
    for (var i = 0; i < otherFiles.length; i++) {
      html += _renderFileItem(otherFiles[i], jobId, true);
    }
  }

  html += '</div>'; // end .orch-file-list
  html += '</div>'; // end .orch-files-section

  area.innerHTML = html;
  area.dataset.planId = planId || '';
  area.dataset.jobId = jobId || '';

  // 如果之前有展开状态，保持展开
  if (_expandedFolder === (planId || jobId)) {
    expandFolderCard();
  }
}

function _renderFileItem(f, jobId, previewable) {
  var fname = f.filename || '?';
  var ftype = f.file_type || 'other';
  var size = f.size_display || _formatSize(f.size_bytes || 0);
  var agent = f.agent_id || '';
  var desc = f.description || '';
  var pr = previewable !== false && (ftype === 'code' || ftype === 'html' || ftype === 'markdown' || ftype === 'data');

  var html = '<div class="orch-file-item">';
  html += '<div class="orch-file-icon ' + ftype + '">' + _fileTypeIcon(ftype) + '</div>';
  html += '<div class="orch-file-info">';
  html += '<div class="orch-file-name" title="' + _escHtml(fname) + '">' + _escHtml(fname) + '</div>';
  html += '<div class="orch-file-meta">' + _escHtml(size) + (agent ? ' \u00B7 ' + _escHtml(agent) : '') + '</div>';
  html += '</div>';
  html += '<div class="orch-file-btns">';
  if (pr) {
    html += '<button type="button" class="orch-file-btn preview" onclick="previewFile(\'' + encodeURIComponent(jobId || '') + '\',\'' + encodeURIComponent(fname) + '\')">\u256F\u25CF\u25A0 \u9884\u89C8</button>';
  }
  html += '<button type="button" class="orch-file-btn" onclick="downloadFile(\'' + encodeURIComponent(jobId || '') + '\',\'' + encodeURIComponent(fname) + '\')">\u2193 \u4E0B\u8F7D</button>';
  html += '</div></div>';
  return html;
}

function toggleFolderCard() {
  var list = document.getElementById('orch-file-list');
  var card = document.getElementById('orch-folder-card');
  var chev = document.getElementById('orch-folder-chevron');
  if (!list || !card) return;
  var isOpen = list.style.display !== 'none';
  if (isOpen) {
    list.style.display = 'none';
    card.classList.remove('open');
    _expandedFolder = null;
  } else {
    expandFolderCard();
  }
}

function expandFolderCard() {
  var list = document.getElementById('orch-file-list');
  var card = document.getElementById('orch-folder-card');
  if (!list || !card) return;
  list.style.display = '';
  card.classList.add('open');
  // 记录当前展开（从 data 属性或文件数据取 plan_id）
  var area = document.getElementById('orch-files-area');
  _expandedFolder = area ? (area.dataset.planId || area.dataset.jobId || 'expanded') : 'expanded';
}

function _fileTypeIcon(ftype) {
  var icons = {
    code:     '\u{1F4BB}',
    html:     '\u{1F310}',
    markdown: '\u{1F4DD}',
    data:     '\u{1F4BE}',
    doc:      '\u{1F4C4}',
    report:   '\u{1F4CA}',
    other:    '\u{1F4C1}',
  };
  return icons[ftype] || icons.other;
}

function _escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function previewFile(jobId, filename) {
  var jid = decodeURIComponent(jobId || '');
  var fname = decodeURIComponent(filename || '');
  if (!jid || !fname) return;

  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jid) + '/files/' + encodeURIComponent(fname))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { toast('读取文件失败: ' + data.error, 'error'); return; }
      _currentModalFile = { jobId: jid, filename: fname };
      openFileModal(fname, data.content || '', data.file_type || 'other', data.size || 0);
    })
    .catch(function(e) { toast('预览失败: ' + e.message, 'error'); });
}

function openFileModal(fname, content, ftype, size) {
  var backdrop = document.getElementById('orch-file-modal-backdrop');
  var nameEl = document.getElementById('orch-file-modal-name');
  var metaEl = document.getElementById('orch-file-modal-meta');
  var contentEl = document.getElementById('orch-file-modal-content');

  if (!backdrop) return;

  if (nameEl) nameEl.textContent = fname;
  if (metaEl) metaEl.textContent = _formatSize(size) + ' \u00B7 ' + ftype;

  if (contentEl) {
    if (ftype === 'markdown') {
      // Markdown 直接渲染
      contentEl.innerHTML = '';
      contentEl.outerHTML = contentEl.outerHTML; // reset
      // 重新获取
      contentEl = document.getElementById('orch-file-modal-content');
      if (contentEl) {
        contentEl.className = 'orch-md-preview';
        contentEl.innerHTML = _renderMarkdown(content);
      }
    } else {
      // 代码：语法高亮 + 行号
      contentEl.innerHTML = '';
      contentEl.outerHTML = contentEl.outerHTML;
      contentEl = document.getElementById('orch-file-modal-content');
      if (contentEl) {
        contentEl.className = '';
        var lines = (content || '').split('\n');
        var totalLines = lines.length;
        var lineNumWidth = String(totalLines).length;
        var lineHtml = '';
        var codeHtml = '';
        for (var li = 0; li < lines.length; li++) {
          var ln = String(li + 1).padStart(lineNumWidth, '\u2007');
          lineHtml += '<div>' + ln + '</div>';
          codeHtml += '<div>' + _escHtml(lines[li] || '') + '</div>';
        }
        contentEl.innerHTML = ''
          + '<div class="orch-code-view">'
          + '<div class="orch-code-linenums">' + lineHtml + '</div>'
          + '<div class="orch-code-content">' + codeHtml + '</div>'
          + '</div>';
      }
    }
  }

  backdrop.classList.add('open');
}

// 极简 Markdown -> HTML 转换
function _renderMarkdown(md) {
  if (!md) return '';
  var html = _escHtml(md);
  // 代码块
  html = html.replace(/&lt;code&gt;([\s\S]*?)&lt;\/code&gt;/g, '<code>$1</code>');
  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 粗体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // 列表
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // 段落
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // 清理空段落
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

function closeFileModal() {
  var backdrop = document.getElementById('orch-file-modal-backdrop');
  if (backdrop) backdrop.classList.remove('open');
  _currentModalFile = null;
}

function downloadCurrentModalFile() {
  if (_currentModalFile) {
    downloadFile(_currentModalFile.jobId, _currentModalFile.filename);
  }
}

function downloadFile(jobId, filename) {
  var jid = decodeURIComponent(jobId || '');
  var fname = decodeURIComponent(filename || '');
  if (!jid || !fname) return;
  window.open('/api/orchestrate/jobs/' + encodeURIComponent(jid) + '/download/' + encodeURIComponent(fname), '_blank');
}

function downloadAllFiles(jobId) {
  var jid = decodeURIComponent(jobId || '');
  if (!jid) return;
  window.open('/api/orchestrate/jobs/' + encodeURIComponent(jid) + '/download-all', '_blank');
}

function openOutputFolder(outputDir) {
  var dir = decodeURIComponent(outputDir || '');
  if (!dir) return;
  // Windows: use explorer
  var win = window.navigator.userAgent.indexOf('Win') !== -1;
  if (win) {
    window.open('file:///' + dir.replace(/\\/g, '/'), '_blank');
  } else {
    toast('\u6253\u5f00\u76ee\u5f55: ' + dir, 'info');
  }
}

function _formatSize(bytes) {
  if (!bytes) return '0B';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

function onJobDone(finalStatus) {
  var badge = document.getElementById('step-badge');
  if (badge) badge.textContent = finalStatus === 'done' ? '\u5df2\u5b8c\u6210' : finalStatus === 'failed' ? '\u5931\u8d25' : '\u5df2\u53d6\u6d88';
  var cancelBtn = document.getElementById('cancel-btn');
  if (cancelBtn) cancelBtn.style.display = 'none';
  for (var i = 0; i < _steps.length; i++) {
    var s = _steps[i];
    if (s.status === 'pending' || s.status === 'active') {
      updateStepStatus(s.id, finalStatus === 'done' ? 'done' : 'fail');
    }
  }
  updateProgress();
  refreshJobList();
}

function cancelSelectedJob() {
  if (!_selectedJobId) return;
  var jid = _selectedJobId;
  if (_streamReaders[jid]) { _streamReaders[jid].cancelFn(); delete _streamReaders[jid]; }
  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jid), { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function() {
      toast('\u4efb\u52a1\u5df2\u53d6\u6d88', 'info');
      appendLog('system', '\u4efb\u52a1\u5df2\u88ab\u53d6\u6d88');
      clearResult();
      onJobDone('cancelled');
    })
    .catch(function(err) { toast('\u53d6\u6d88\u5931\u8d25: ' + err.message, 'error'); });
}

function _findStepByAgentId(agentId) {
  for (var i = 0; i < _steps.length; i++) {
    if (_steps[i].agentId === agentId) return _steps[i];
  }
  return null;
}

function _resolveStepKey(agentRaw) {
  var key = normKey(agentRaw);
  if (key !== 'system') return key;
  // 自定义 agent：尝试用 agentId 匹配步骤
  var step = _findStepByAgentId(agentRaw);
  return step ? step.id : 'system';
}

function normKey(agent) {
  if (!agent) return 'system';
  if (agent === 'search_worker' || agent === 'search') return 'search_worker';
  if (agent === 'rag_worker' || agent === 'rag') return 'rag_worker';
  if (agent === 'coder') return 'coder';
  if (agent === 'self_healer') return 'self_healer';
  if (agent === 'supervisor') return 'supervisor';
  var s = String(agent);
  var l = s.toLowerCase();
  if (l.indexOf('worker_search') !== -1 || l.indexOf('agent_worker_search') !== -1) return 'search_worker';
  if (l.indexOf('worker_rag') !== -1 || l.indexOf('agent_worker_rag') !== -1) return 'rag_worker';
  if (l.indexOf('worker_coder') !== -1 || l.indexOf('agent_worker_coder') !== -1) return 'coder';
  return 'system';
}

function clearRightPanel() {
  _steps = []; _stepIdx = 0;
  var ph = document.getElementById('progress-header');
  if (ph) ph.style.display = 'none';
  var cancelBtn = document.getElementById('cancel-btn');
  if (cancelBtn) cancelBtn.style.display = '';
  clearLogs(); clearResult(); renderStepList();
}

function hideLogEmpty() {
  var el = document.getElementById('log-empty');
  if (el) el.style.display = 'none';
}

function resetTimeline() { _steps = []; renderStepList(); }

function appendLog(agent, message) {
  var body = document.getElementById('log-body');
  if (!body) return;
  hideLogEmpty();
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  var time = h + ':' + m + ':' + s;
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML =
    '<span class="log-time">' + time + '</span>' +
    '<span class="log-agent ' + agent + '">[' + agent.replace('_worker','') + ']</span>' +
    '<span class="log-msg">' + esc(message) + '</span>';
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

function clearLogs() {
  var body = document.getElementById('log-body');
  if (body) body.innerHTML = '<div class="orch-empty" id="log-empty"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>\u6682\u65e0\u65e5\u5fd7</div>';
}

function clearResult() {
  _orchFullSummary = '';
  closeResultDrawer();
  var pre = document.getElementById('orch-drawer-pre');

  var evalEmpty = document.getElementById('eval-empty');

    delete filesArea.dataset.planId;
    delete filesArea.dataset.jobId;
  }
  closeFileModal();
}

function clearInput() {
  var req = document.getElementById('orch-req');
  if (req) req.value = '';
}

// 内联 onclick 需全局函数（IIFE 内定义不会挂到 window）
window.startNewJob = startNewJob;

window.toggleTimeline = toggleTimeline;

})();
