<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编排台 — Crayfish</title>
  <script src="/lib/shared.js"></script>
  <style>
    body { background: var(--noir-bg); }
    .orchestrate-page {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      padding: 20px 24px;
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }
    /* left panel */
    .orch-left {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .orch-left::-webkit-scrollbar { width: 3px; }
    .orch-left::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .orch-card {
      background: var(--noir-card);
      border: 1px solid var(--noir-border);
      border-radius: 10px;
      padding: 16px;
    }
    .orch-card-title {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--noir-dim);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--noir-border);
    }
    .orch-req-input {
      width: 100%;
      background: var(--noir-surface);
      border: 1px solid var(--noir-border);
      border-radius: 8px;
      color: var(--noir-text);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 10px 12px;
      resize: none;
      min-height: 100px;
      outline: none;
      transition: border-color 150ms;
      box-sizing: border-box;
    }
    .orch-req-input:focus { border-color: var(--noir-accent-hi); }
    .orch-req-input::placeholder { color: var(--noir-muted); }
    .orch-btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .orch-btn {
      flex: 1;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      border: 1px solid var(--noir-border);
      background: var(--noir-surface);
      color: var(--noir-text);
      transition: all 150ms;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .orch-btn:hover { border-color: var(--noir-border-hi); background: var(--noir-card); }
    .orch-btn.primary {
      background: rgba(139,0,0,0.2);
      border-color: rgba(139,0,0,0.5);
      color: #c0392b;
    }
    .orch-btn.primary:hover { background: rgba(139,0,0,0.3); }
    .orch-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .orch-btn.running { animation: orchPulse 1.5s ease-in-out infinite; }
    @keyframes orchPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    /* agent config */
    .agent-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(42,42,42,0.6);
    }
    .agent-toggle:last-child { border-bottom: none; }
    .agent-toggle input[type=checkbox] { display: none; }
    .agent-toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex: 1;
    }
    .agent-check-box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid var(--noir-border-hi);
      background: var(--noir-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms;
      flex-shrink: 0;
    }
    .agent-toggle input:checked ~ .agent-check-box {
      background: rgba(139,0,0,0.3);
      border-color: var(--noir-accent-hi);
    }
    .agent-toggle input:checked ~ .agent-check-box::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid #c0392b;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }
    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .agent-dot.search { background: #4ade80; }
    .agent-dot.rag { background: #60a5fa; }
    .agent-dot.coder { background: #facc15; }
    .agent-name {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      color: var(--noir-text);
    }
    /* quality slider */
    .quality-row { display: flex; align-items: center; gap: 10px; }
    .quality-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--noir-border);
      outline: none;
    }
    .quality-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--noir-accent-hi);
      cursor: pointer;
    }
    .quality-val {
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      color: #c0392b;
      min-width: 32px;
      text-align: right;
    }
    /* right panel */
    .orch-right {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .orch-vis {
      flex: 0 0 auto;
      min-height: 200px;
    }
    .orch-graph {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      overflow-x: auto;
    }
    .orch-graph::-webkit-scrollbar { height: 3px; }
    .orch-graph::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    /* supervisor node */
    .node-supervisor {
      background: rgba(139,0,0,0.15);
      border: 1px solid rgba(139,0,0,0.5);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      min-width: 120px;
      flex-shrink: 0;
    }
    .node-supervisor .node-label {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #c0392b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .node-supervisor .node-sub {
      font-size: 10px;
      color: var(--noir-dim);
      margin-top: 3px;
    }
    /* arrow */
    .graph-arrow {
      color: var(--noir-muted);
      font-size: 18px;
      flex-shrink: 0;
    }
    /* worker node */
    .node-worker {
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      min-width: 130px;
      flex-shrink: 0;
      border: 1px solid var(--noir-border);
      background: var(--noir-surface);
      transition: all 300ms;
      position: relative;
    }
    .node-worker.pending { opacity: 0.4; }
    .node-worker.running { border-color: var(--noir-accent-hi); background: rgba(139,0,0,0.1); }
    .node-worker.done { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.05); }
    .node-worker.rejected { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.05); }
    .node-worker.healing { border-color: rgba(250,204,21,0.4); background: rgba(250,204,21,0.05); }
    .worker-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto 6px;
    }
    .worker-dot.search { background: #4ade80; }
    .worker-dot.rag { background: #60a5fa; }
    .worker-dot.coder { background: #facc15; }
    .node-worker .node-label {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: var(--noir-text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .node-worker .node-sub {
      font-size: 10px;
      color: var(--noir-dim);
      margin-top: 3px;
    }
    .node-score {
      position: absolute;
      top: 6px;
      right: 8px;
      font-family: 'Courier Prime', monospace;
      font-size: 9px;
      color: var(--noir-dim);
    }
    /* loop counter */
    .loop-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      background: rgba(139,0,0,0.1);
      border: 1px solid rgba(139,0,0,0.3);
      color: #c0392b;
    }
    /* logs */
    .orch-logs {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px;
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .log-entry {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      line-height: 1.5;
      animation: logSlide 200ms ease both;
    }
    @keyframes logSlide { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .log-time { color: var(--noir-muted); flex-shrink: 0; }
    .log-agent { flex-shrink: 0; min-width: 80px; }
    .log-agent.search { color: #4ade80; }
    .log-agent.rag { color: #60a5fa; }
    .log-agent.coder { color: #facc15; }
    .log-agent.supervisor { color: #c0392b; }
    .log-agent.self_healer { color: #facc15; }
    .log-agent.system { color: var(--noir-dim); }
    .log-msg { color: var(--noir-text); word-break: break-all; }
    /* plan */
    .plan-view { padding: 8px 4px; }
    .plan-task {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(42,42,42,0.5);
    }
    .plan-task:last-child { border-bottom: none; }
    .plan-task-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .plan-task-text { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-dim); line-height: 1.5; }
    .plan-task-agent { font-size: 9px; color: var(--noir-muted); margin-top: 2px; }
    /* final result */
    .orch-result {
      flex: 0 0 auto;
      max-height: 280px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .result-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px;
    }
    .result-body::-webkit-scrollbar { width: 3px; }
    .result-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .result-content {
      background: var(--noir-surface);
      border: 1px solid var(--noir-border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: var(--noir-text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-quality {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .quality-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--noir-border);
      border-radius: 3px;
      overflow: hidden;
    }
    .quality-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      transition: width 600ms ease;
    }
    .quality-bar.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .quality-score-label {
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      color: #c0392b;
      font-weight: 700;
    }
    .quality-score-label.high { color: #2ecc71; }
    /* pass/fail badge */
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 4px;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-left: 10px;
    }
    .result-badge.pass { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }
    .result-badge.fail { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #c0392b; }
    /* empty state */
    .orch-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--noir-muted);
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      gap: 10px;
    }
    .orch-empty svg { width: 40px; height: 40px; stroke: #333; fill: none; stroke-width: 1; }
    /* back btn */
    .back-row { display: flex; align-items: center; }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--noir-border);
      background: transparent;
      color: var(--noir-dim);
      font-size: 12px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 150ms;
    }
    .back-btn:hover { border-color: var(--noir-border-hi); color: var(--noir-text); }
    .back-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
    /* conflict badge */
    .conflict-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      background: rgba(250,204,21,0.1);
      border: 1px solid rgba(250,204,21,0.3);
      color: #facc15;
      margin-left: 8px;
    }
  </style>
</head>
<body class="noir-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content"></div>
</div>

<script>
// ── Page content template ─────────────────────────────────────────
var ORCHESTRATE_CONTENT = [
  '<div class="orchestrate-page">',
    // Left panel
    '<div class="orch-left">',

      // Header row
      '<div class="back-row">',
        '<button class="back-btn" onclick="navigateTo(\'/tasks\')">',
          '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
          '返回任务',
        '</button>',
      '</div>',

      // Requirement input
      '<div class="orch-card">',
        '<div class="orch-card-title">// 需求输入</div>',
        '<textarea class="orch-req-input" id="orch-req" placeholder="输入你的复杂需求...&#10;例如: 搜索 Python async 最新用法，并结合我的项目配置生成异步代码"></textarea>',
        '<div class="orch-btn-row">',
          '<button class="orch-btn primary" id="orch-start-btn" onclick="startOrchestration()">',
            '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
            '开始编排',
          '</button>',
          '<button class="orch-btn" onclick="clearOrchestration()">清空</button>',
        '</div>',
      '</div>',

      // Agent config
      '<div class="orch-card">',
        '<div class="orch-card-title">// Agent 配置</div>',
        '<div class="agent-toggle">',
          '<input type="checkbox" id="agent-search" checked>',
          '<label class="agent-toggle-label" for="agent-search">',
            '<div class="agent-check-box"></div>',
            '<div class="agent-dot search"></div>',
            '<span class="agent-name">Search Worker</span>',
          '</label>',
        '</div>',
        '<div class="agent-toggle">',
          '<input type="checkbox" id="agent-rag" checked>',
          '<label class="agent-toggle-label" for="agent-rag">',
            '<div class="agent-check-box"></div>',
            '<div class="agent-dot rag"></div>',
            '<span class="agent-name">RAG Worker</span>',
          '</label>',
        '</div>',
        '<div class="agent-toggle">',
          '<input type="checkbox" id="agent-coder" checked>',
          '<label class="agent-toggle-label" for="agent-coder">',
            '<div class="agent-check-box"></div>',
            '<div class="agent-dot coder"></div>',
            '<span class="agent-name">Coder</span>',
          '</label>',
        '</div>',
      '</div>',

      // Quality threshold
      '<div class="orch-card">',
        '<div class="orch-card-title">// 质量阈值</div>',
        '<div class="quality-row">',
          '<input type="range" class="quality-slider" id="orch-quality" min="5" max="10" step="0.5" value="8">',
          '<span class="quality-val" id="orch-quality-val">8.0</span>',
        '</div>',
      '</div>',

    '</div>', // end left

    // Right panel
    '<div class="orch-right">',

      // Execution graph
      '<div class="orch-card orch-vis">',
        '<div class="orch-card-title">// 执行状态</div>',
        '<div class="orch-graph" id="orch-graph">',
          '<div class="node-supervisor" id="node-supervisor">',
            '<div class="node-label">Supervisor</div>',
            '<div class="node-sub" id="supervisor-sub">等待开始</div>',
          '</div>',
        '</div>',
      '</div>',

      // Logs
      '<div class="orch-card orch-logs">',
        '<div class="orch-card-title">// 执行日志 <span class="loop-badge" id="loop-badge" style="display:none">循环 0/15</span><span class="conflict-badge" id="conflict-badge" style="display:none">数据冲突</span></div>',
        '<div class="log-body" id="log-body">',
          '<div class="orch-empty" id="log-empty">',
            '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
            '暂无日志',
          '</div>',
        '</div>',
      '</div>',

      // Final result
      '<div class="orch-card orch-result">',
        '<div class="orch-card-title">// 最终结果</div>',
        '<div class="result-quality" id="result-quality-row" style="display:none">',
          '<div class="quality-bar-wrap"><div class="quality-bar" id="quality-bar"></div></div>',
          '<span class="quality-score-label" id="quality-score-label">0.0</span>',
          '<span class="result-badge" id="result-badge"></span>',
        '</div>',
        '<div class="result-body" id="result-body">',
          '<div class="orch-empty" id="result-empty">',
            '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
            '等待执行结果',
          '</div>',
        '</div>',
      '</div>',

    '</div>', // end right
  '</div>'
].join('');

// ── State ─────────────────────────────────────────────────────────
var _orchestrator = null;
var _evtSource = null;

var _workerState = {
  search: { status: 'pending', quality: 0 },
  rag: { status: 'pending', quality: 0 },
  coder: { status: 'pending', quality: 0 },
};

// ── Page lifecycle ───────────────────────────────────────────────
function orchestrateOnShow(savedState) {
  // restore state
}

function orchestrateOnSave() {
  return null;
}

registerSPA('/orchestrate', ORCHESTRATE_CONTENT, orchestrateOnShow, orchestrateOnSave);
injectStyles();
initPage('/orchestrate');
initSPA('/orchestrate');

// ── Quality slider ────────────────────────────────────────────────
var qualSlider = document.getElementById('orch-quality');
if (qualSlider) {
  qualSlider.addEventListener('input', function() {
    var v = document.getElementById('orch-quality-val');
    if (v) v.textContent = parseFloat(this.value).toFixed(1);
  });
}

// ── Start orchestration ───────────────────────────────────────────
function startOrchestration() {
  var reqEl = document.getElementById('orch-req');
  var req = reqEl ? reqEl.value.trim() : '';
  if (!req) { toast('请输入需求', 'error'); return; }

  // build enabled agents list
  var enabled = [];
  if (document.getElementById('agent-search').checked) enabled.push('search');
  if (document.getElementById('agent-rag').checked) enabled.push('rag');
  if (document.getElementById('agent-coder').checked) enabled.push('coder');
  if (!enabled.length) { toast('请至少选择一个 Agent', 'error'); return; }

  var qualityThreshold = parseFloat(document.getElementById('orch-quality').value);

  // disable button
  var btn = document.getElementById('orch-start-btn');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('running');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 执行中...';
  }

  // reset state
  _workerState = {
    search: { status: 'pending', quality: 0 },
    rag: { status: 'pending', quality: 0 },
    coder: { status: 'pending', quality: 0 },
  };
  resetGraph();
  clearLogs();
  clearResult();

  // SSE
  var threadId = G.threadId || 'orchestrate';
  var url = '/api/orchestrate';
  _evtSource = new EventSource(url + '?requirement=' + encodeURIComponent(req) +
    '&enabled_agents=' + encodeURIComponent(JSON.stringify(enabled)) +
    '&quality_threshold=' + qualityThreshold +
    '&thread_id=' + encodeURIComponent(threadId));

  // Note: GET SSE can't have body; we use query params
  // Re-do with POST approach via fetch + ReadableStream for SSE over POST
  // Since EventSource only supports GET, we encode params in URL
  // The backend reads OrchestrateRequest from query params instead

  _evtSource.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      handleOrchEvent(data);
    } catch(err) {
      console.error('SSE parse error', err, e.data);
    }
  };

  _evtSource.addEventListener('supervisor_plan', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'supervisor_plan', data: data });
  });

  _evtSource.addEventListener('worker_start', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'worker_start', data: data });
  });

  _evtSource.addEventListener('worker_progress', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'worker_progress', data: data });
  });

  _evtSource.addEventListener('worker_done', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'worker_done', data: data });
  });

  _evtSource.addEventListener('worker_rejected', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'worker_rejected', data: data });
  });

  _evtSource.addEventListener('quality_score', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'quality_score', data: data });
  });

  _evtSource.addEventListener('self_healing', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'self_healing', data: data });
  });

  _evtSource.addEventListener('loop_warning', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'loop_warning', data: data });
  });

  _evtSource.addEventListener('human_intervention', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'human_intervention', data: data });
  });

  _evtSource.addEventListener('conflict_detected', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'conflict_detected', data: data });
  });

  _evtSource.addEventListener('final_result', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'final_result', data: data });
  });

  _evtSource.addEventListener('error', function(e) {
    var data = JSON.parse(e.data);
    handleOrchEvent({ type: 'error', data: data });
  });

  _evtSource.onerror = function(err) {
    console.error('SSE error', err);
    var btn = document.getElementById('orch-start-btn');
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('running');
      btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始编排';
    }
  };
}

// ── Event handler ────────────────────────────────────────────────
function handleOrchEvent(data) {
  var type = data.type;
  var d = data.data || data;

  switch (type) {
    case 'supervisor_plan':
      onSupervisorPlan(d);
      break;
    case 'worker_start':
      onWorkerStart(d);
      break;
    case 'worker_progress':
      onWorkerProgress(d);
      break;
    case 'worker_done':
      onWorkerDone(d);
      break;
    case 'worker_rejected':
      onWorkerRejected(d);
      break;
    case 'quality_score':
      onQualityScore(d);
      break;
    case 'self_healing':
      onSelfHealing(d);
      break;
    case 'loop_warning':
      onLoopWarning(d);
      break;
    case 'human_intervention':
      onHumanIntervention(d);
      break;
    case 'conflict_detected':
      onConflictDetected(d);
      break;
    case 'final_result':
      onFinalResult(d);
      break;
    case 'error':
      onOrchError(d);
      break;
    case 'done':
      onOrchDone();
      break;
  }
}

// ── Plan ─────────────────────────────────────────────────────────
function onSupervisorPlan(d) {
  var tasks = d.data ? d.data.tasks : d.tasks;
  var planId = d.data ? d.data.plan_id : d.plan_id;

  setSupervisorSub('规划中');
  appendLog('supervisor', '正在拆解任务...');

  // render plan tasks
  var logEmpty = document.getElementById('log-empty');
  if (logEmpty) logEmpty.style.display = 'none';

  if (tasks && tasks.length) {
    tasks.forEach(function(t) {
      var agentShort = t.assigned_agent ? t.assigned_agent.replace('_worker', '') : '?';
      var agentClass = agentShort === 'search' ? 'search' : agentShort === 'rag' ? 'rag' : agentShort === 'coder' ? 'coder' : 'system';
      appendLog('supervisor', '计划任务: ' + t.description);
      appendLog('system', '  → 分配给: ' + agentShort + ' (' + t.task_id + ')');
    });
  }

  // render worker nodes in graph
  renderWorkerNodes(tasks || []);
  setSupervisorSub('已规划 ' + (tasks ? tasks.length : 0) + ' 个任务');
}

// ── Worker nodes ─────────────────────────────────────────────────
function renderWorkerNodes(tasks) {
  var graph = document.getElementById('orch-graph');
  if (!graph) return;

  // keep supervisor node, remove worker nodes
  var existing = graph.querySelectorAll('.node-worker');
  existing.forEach(function(n) { n.remove(); });
  var existingArrows = graph.querySelectorAll('.graph-arrow');
  existingArrows.forEach(function(a) { a.remove(); });

  var agents = [
    { key: 'search', label: 'Search', dotClass: 'search', shortLabel: '搜索' },
    { key: 'rag', label: 'RAG', dotClass: 'rag', shortLabel: '记忆' },
    { key: 'coder', label: 'Coder', dotClass: 'coder', shortLabel: '代码' },
  ];

  agents.forEach(function(a) {
    var arrow = document.createElement('div');
    arrow.className = 'graph-arrow';
    arrow.textContent = '→';
    graph.appendChild(arrow);

    var node = document.createElement('div');
    node.className = 'node-worker pending';
    node.id = 'node-' + a.key;
    node.innerHTML =
      '<div class="node-score" id="score-' + a.key + '"></div>' +
      '<div class="worker-dot ' + a.dotClass + '"></div>' +
      '<div class="node-label">' + a.label + '</div>' +
      '<div class="node-sub" id="sub-' + a.key + '">等待</div>';
    graph.appendChild(node);
  });
}

function updateWorkerNode(key, status, sub, quality) {
  var node = document.getElementById('node-' + key);
  if (!node) return;
  node.className = 'node-worker ' + status;
  var subEl = document.getElementById('sub-' + key);
  if (subEl) subEl.textContent = sub || status;
  var scoreEl = document.getElementById('score-' + key);
  if (scoreEl && quality !== undefined) scoreEl.textContent = quality > 0 ? quality.toFixed(1) : '';
}

// ── Worker events ────────────────────────────────────────────────
function onWorkerStart(d) {
  var agent = d.agent || '';
  var key = agent.replace('_worker', '');
  if (key === agent) key = agent === 'coder' ? 'coder' : agent;
  var agentShort = key === 'search' ? 'search' : key === 'rag' ? 'rag' : key === 'coder' ? 'coder' : key;
  var agentClass = key === 'search' ? 'search' : key === 'rag' ? 'rag' : 'coder';

  updateWorkerNode(agentShort, 'running', '执行中...');
  appendLog(agentClass, '开始: ' + (d.task_description || ''));
}

function onWorkerProgress(d) {
  var agent = d.agent || '';
  var key = agent.replace('_worker', '');
  if (key === agent) key = agent === 'coder' ? 'coder' : agent;
  var agentClass = key === 'search' ? 'search' : key === 'rag' ? 'rag' : 'coder';
  appendLog(agentClass, d.message || '进行中');
}

function onWorkerDone(d) {
  var agent = d.agent || '';
  var key = agent.replace('_worker', '');
  if (key === agent) key = agent === 'coder' ? 'coder' : agent;
  var agentClass = key === 'search' ? 'search' : key === 'rag' ? 'rag' : 'coder';
  var score = d.quality_score || 0;
  var quality = parseFloat(score);

  _workerState[agentClass] = { status: 'done', quality: quality };
  updateWorkerNode(agentClass, 'done', '完成', quality);
  appendLog(agentClass, '完成 (质量: ' + quality.toFixed(1) + '/10)');

  setSupervisorSub('收集中...');
}

function onWorkerRejected(d) {
  var agent = d.agent || '';
  var key = agent.replace('_worker', '');
  if (key === agent) key = agent === 'coder' ? 'coder' : agent;
  var agentClass = key === 'search' ? 'search' : key === 'rag' ? 'rag' : 'coder';

  updateWorkerNode(agentClass, 'rejected', '驳回');
  appendLog(agentClass, '驳回: ' + (d.reason || '未知原因'));
}

function onSelfHealing(d) {
  var agent = d.agent || 'self_healer';
  var agentClass = agent === 'self_healer' ? 'self_healer' : agent.replace('_worker', '');
  appendLog(agentClass, '自修复 (尝试 #' + (d.attempt || '?') + '): ' + (d.reason || ''));
}

function onQualityScore(d) {
  var score = d.score || 0;
  var note = d.note || '';
  appendLog('system', '整体质量评分: ' + score.toFixed(1) + '/10 ' + note);
}

function onLoopWarning(d) {
  var loop = d.loop_count || 0;
  var badge = document.getElementById('loop-badge');
  if (badge) {
    badge.style.display = 'inline-flex';
    badge.textContent = '循环 ' + loop + '/15';
  }
  appendLog('system', '⚠️ 循环警告: 已循环 ' + loop + ' 次');
}

function onHumanIntervention(d) {
  appendLog('system', '⚠️ 人工介入: ' + (d.message || ''));
}

function onConflictDetected(d) {
  var badge = document.getElementById('conflict-badge');
  if (badge) badge.style.display = 'inline-flex';
  appendLog('system', '⚠️ 检测到数据冲突');
}

function onOrchError(d) {
  appendLog('system', '错误: ' + (d.message || JSON.stringify(d)));
}

function onFinalResult(d) {
  var score = d.quality_score || 0;
  var passed = d.passed;

  // update quality bar
  var qRow = document.getElementById('result-quality-row');
  var bar = document.getElementById('quality-bar');
  var label = document.getElementById('quality-score-label');
  var badge = document.getElementById('result-badge');

  if (qRow) qRow.style.display = 'flex';
  if (bar) {
    bar.style.width = (score * 10) + '%';
    bar.className = score >= 8 ? 'quality-bar high' : 'quality-bar';
  }
  if (label) {
    label.textContent = score.toFixed(1);
    label.className = score >= 8 ? 'quality-score-label high' : 'quality-score-label';
  }
  if (badge) {
    badge.className = 'result-badge ' + (passed ? 'pass' : 'fail');
    badge.textContent = passed ? '✓ 通过' : '✗ 未达标';
  }

  // render result
  var body = document.getElementById('result-body');
  var empty = document.getElementById('result-empty');
  if (empty) empty.style.display = 'none';
  if (body) {
    var summary = d.summary || '';
    body.innerHTML = '<div class="result-content">' + esc(summary) + '</div>';
  }

  setSupervisorSub(passed ? '已完成 ✓' : '未达标 ✗');
  appendLog('supervisor', '最终汇总完成 (质量: ' + score.toFixed(1) + '/10)');
}

function onOrchDone() {
  var btn = document.getElementById('orch-start-btn');
  if (btn) {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 重新编排';
  }
  if (_evtSource) {
    _evtSource.close();
    _evtSource = null;
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function setSupervisorSub(text) {
  var el = document.getElementById('supervisor-sub');
  if (el) el.textContent = text;
}

function resetGraph() {
  var graph = document.getElementById('orch-graph');
  if (!graph) return;
  // remove worker nodes and arrows, keep supervisor
  var workers = graph.querySelectorAll('.node-worker, .graph-arrow');
  workers.forEach(function(n) { n.remove(); });
  setSupervisorSub('等待开始');
  var loopBadge = document.getElementById('loop-badge');
  if (loopBadge) loopBadge.style.display = 'none';
  var conflictBadge = document.getElementById('conflict-badge');
  if (conflictBadge) conflictBadge.style.display = 'none';
}

function appendLog(agent, message) {
  var body = document.getElementById('log-body');
  if (!body) return;
  var empty = document.getElementById('log-empty');
  if (empty) empty.style.display = 'none';

  var now = new Date();
  var time = [now.getHours(), now.getMinutes(), now.getSeconds()].map(function(n) { return String(n).padStart(2, '0'); }).join(':');

  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML =
    '<span class="log-time">' + time + '</span>' +
    '<span class="log-agent ' + agent + '">[' + agent + ']</span>' +
    '<span class="log-msg">' + esc(message) + '</span>';
  body.appendChild(entry);

  // auto scroll
  body.scrollTop = body.scrollHeight;
}

function clearLogs() {
  var body = document.getElementById('log-body');
  if (body) body.innerHTML = '';
  var empty = document.getElementById('log-empty');
  if (empty) { empty.style.display = ''; empty.innerHTML = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>暂无日志'; }
}

function clearResult() {
  var body = document.getElementById('result-body');
  if (body) body.innerHTML = '';
  var empty = document.getElementById('result-empty');
  if (empty) { empty.style.display = ''; empty.innerHTML = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>等待执行结果'; }
  var qRow = document.getElementById('result-quality-row');
  if (qRow) qRow.style.display = 'none';
}

function clearOrchestration() {
  if (_evtSource) {
    _evtSource.close();
    _evtSource = null;
  }
  var req = document.getElementById('orch-req');
  if (req) req.value = '';
  resetGraph();
  clearLogs();
  clearResult();
  var btn = document.getElementById('orch-start-btn');
  if (btn) {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始编排';
  }
}
</script>
</body>
