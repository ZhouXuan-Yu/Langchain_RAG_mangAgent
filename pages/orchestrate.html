<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编排台 — Crayfish</title>
  <script src="/lib/shared.js"></script>
  <style>
    body { background: var(--noir-bg); }
    .orchestrate-page {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      padding: 20px 24px;
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }
    /* ── Left panel ─────────────────────────────────────────────── */
    .orch-left { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 4px; }
    .orch-left::-webkit-scrollbar { width: 3px; }
    .orch-left::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .orch-card { background: var(--noir-card); border: 1px solid var(--noir-border); border-radius: 10px; padding: 14px; }
    .orch-card-title { font-family: 'Courier Prime', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--noir-dim); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--noir-border); }
    .orch-req-input { width: 100%; background: var(--noir-surface); border: 1px solid var(--noir-border); border-radius: 8px; color: var(--noir-text); font-family: var(--font-sans); font-size: 13px; padding: 10px 12px; resize: none; min-height: 80px; outline: none; transition: border-color 150ms; box-sizing: border-box; }
    .orch-req-input:focus { border-color: var(--noir-accent-hi); }
    .orch-req-input::placeholder { color: var(--noir-muted); }
    .orch-btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .orch-btn { flex: 1; padding: 9px 14px; border-radius: 8px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; border: 1px solid var(--noir-border); background: var(--noir-surface); color: var(--noir-text); transition: all 150ms; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .orch-btn:hover { border-color: var(--noir-border-hi); background: var(--noir-card); }
    .orch-btn.primary { background: rgba(139,0,0,0.2); border-color: rgba(139,0,0,0.5); color: #c0392b; }
    .orch-btn.primary:hover { background: rgba(139,0,0,0.3); }
    .orch-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .orch-btn.running { animation: orchPulse 1.5s ease-in-out infinite; }
    @keyframes orchPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .orch-btn.cancel-btn { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: #f87171; }
    .orch-btn.cancel-btn:hover { background: rgba(248,113,113,0.2); }
    .agent-toggle { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(42,42,42,0.6); cursor: pointer; }
    .agent-toggle:last-child { border-bottom: none; }
    .agent-toggle input[type=checkbox] { display: none; }
    .agent-check-box { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--noir-border-hi); background: var(--noir-surface); display: flex; align-items: center; justify-content: center; transition: all 150ms; flex-shrink: 0; }
    .agent-toggle input:checked ~ .agent-check-box { background: rgba(139,0,0,0.3); border-color: var(--noir-accent-hi); }
    .agent-toggle input:checked ~ .agent-check-box::after { content: ''; width: 6px; height: 10px; border: 2px solid #c0392b; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); display: block; }
    .agent-meta { display: flex; align-items: center; gap: 8px; }
    .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-dot.search { background: #4ade80; }
    .agent-dot.rag { background: #60a5fa; }
    .agent-dot.coder { background: #facc15; }
    .agent-name { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--noir-text); }
    .quality-row { display: flex; align-items: center; gap: 10px; }
    .quality-slider { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--noir-border); outline: none; }
    .quality-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--noir-accent-hi); cursor: pointer; }
    .quality-val { font-family: 'Courier Prime', monospace; font-size: 13px; color: #c0392b; min-width: 32px; text-align: right; }
    /* ── Job history ───────────────────────────────────────────── */
    .job-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .job-list::-webkit-scrollbar { width: 3px; }
    .job-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .job-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--noir-border); background: var(--noir-surface); cursor: pointer; transition: all 150ms; }
    .job-item:hover { border-color: var(--noir-border-hi); }
    .job-item.selected { border-color: rgba(139,0,0,0.6); background: rgba(139,0,0,0.08); }
    .job-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .job-status-dot.pending   { background: #555; }
    .job-status-dot.running   { background: #c0392b; animation: pulseDot 1s infinite; }
    .job-status-dot.done      { background: #4ade80; }
    .job-status-dot.failed    { background: #f87171; }
    .job-status-dot.cancelled { background: #888; }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .job-info { flex: 1; min-width: 0; }
    .job-req-preview { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-meta { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); margin-top: 2px; }
    .job-quality { font-family: 'Courier Prime', monospace; font-size: 11px; flex-shrink: 0; }
    .job-quality.high { color: #2ecc71; }
    .job-quality.fail { color: #f87171; }
    .job-empty { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-muted); text-align: center; padding: 20px 0; }
    /* ── Right panel ───────────────────────────────────────────── */
    .orch-right { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }

    /* Overall progress bar */
    .progress-header { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--noir-card); border: 1px solid var(--noir-border); border-radius: 10px; }
    .progress-label { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-dim); white-space: nowrap; }
    .progress-track { flex: 1; height: 6px; background: var(--noir-border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: width 400ms ease; }
    .progress-fill.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .progress-pct { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--noir-text); min-width: 36px; text-align: right; }
    .step-badge { font-family: 'Courier Prime', monospace; font-size: 11px; color: #c0392b; background: rgba(139,0,0,0.12); border: 1px solid rgba(139,0,0,0.3); border-radius: 4px; padding: 2px 8px; white-space: nowrap; }

    /* Step timeline */
    .step-timeline { flex: 0 0 auto; background: var(--noir-card); border: 1px solid var(--noir-border); border-radius: 10px; overflow: hidden; max-height: 240px; display: flex; flex-direction: column; }
    .step-timeline-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--noir-border); cursor: pointer; flex-shrink: 0; }
    .step-timeline-header:hover { background: rgba(255,255,255,0.02); }
    .step-timeline-title { font-family: 'Courier Prime', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--noir-dim); }
    .step-timeline-toggle { font-size: 14px; color: var(--noir-dim); transition: transform 200ms; line-height: 1; }
    .step-timeline.collapsed .step-timeline-toggle { transform: rotate(-90deg); }
    .step-timeline.collapsed .step-list { display: none; }
    .step-list { overflow-y: auto; padding: 4px 0; flex: 1; }
    .step-list::-webkit-scrollbar { width: 3px; }
    .step-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 14px; transition: background 150ms; }
    .step-item:hover { background: rgba(255,255,255,0.02); }
    .step-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px solid; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: 'Courier Prime', monospace; }
    .step-icon.pending   { border-color: #444; background: transparent; color: #555; }
    .step-icon.active    { border-color: #c0392b; background: rgba(139,0,0,0.2); color: #c0392b; animation: stepPulse 1s infinite; }
    @keyframes stepPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .step-icon.done      { border-color: #4ade80; background: rgba(74,222,128,0.15); color: #4ade80; }
    .step-icon.fail      { border-color: #f87171; background: rgba(248,113,113,0.15); color: #f87171; }
    .step-content { flex: 1; min-width: 0; }
    .step-name { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-text); }
    .step-desc { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-time { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); flex-shrink: 0; margin-top: 3px; }

    /* Log area */
    .orch-logs { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .log-body { flex: 1; overflow-y: auto; padding: 8px 4px; }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .log-entry { display: flex; gap: 10px; padding: 4px 0; font-family: 'Courier Prime', monospace; font-size: 11px; line-height: 1.5; animation: logSlide 200ms ease both; }
    @keyframes logSlide { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .log-time { color: var(--noir-muted); flex-shrink: 0; }
    .log-agent { flex-shrink: 0; min-width: 80px; }
    .log-agent.search        { color: #4ade80; }
    .log-agent.rag           { color: #60a5fa; }
    .log-agent.coder         { color: #facc15; }
    .log-agent.supervisor    { color: #c0392b; }
    .log-agent.self_healer   { color: #facc15; }
    .log-agent.system        { color: var(--noir-dim); }
    .log-msg { color: var(--noir-text); word-break: break-all; }

    /* Result */
    .orch-result { flex: 0 0 auto; max-height: 260px; overflow: hidden; display: flex; flex-direction: column; }
    .result-body { flex: 1; overflow-y: auto; padding: 8px 4px; }
    .result-body::-webkit-scrollbar { width: 3px; }
    .result-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .result-content { background: var(--noir-surface); border: 1px solid var(--noir-border); border-radius: 8px; padding: 14px; font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-text); line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
    .result-quality { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .quality-bar-wrap { flex: 1; height: 6px; background: var(--noir-border); border-radius: 3px; overflow: hidden; }
    .quality-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: width 600ms ease; }
    .quality-bar.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .quality-score-label { font-family: 'Courier Prime', monospace; font-size: 13px; color: #c0392b; font-weight: 700; }
    .quality-score-label.high { color: #2ecc71; }
    .result-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 4px; font-family: 'Courier Prime', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-left: 10px; }
    .result-badge.pass { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }
    .result-badge.fail { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4); color: #c0392b; }
    .orch-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--noir-muted); font-family: 'Courier Prime', monospace; font-size: 12px; gap: 10px; }
    .orch-empty svg { width: 40px; height: 40px; stroke: #333; fill: none; stroke-width: 1; }
    .back-row { display: flex; align-items: center; }
    .back-btn { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--noir-border); background: transparent; color: var(--noir-dim); font-size: 12px; font-family: var(--font-sans); cursor: pointer; transition: all 150ms; }
    .back-btn:hover { border-color: var(--noir-border-hi); color: var(--noir-text); }
    .back-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--noir-border-hi); border-top-color: #c0392b; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body class="noir-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  Page content template
// ═══════════════════════════════════════════════════════════════════════════
var ORCHESTRATE_CONTENT = [
  '<div class="orchestrate-page">',

    // LEFT
    '<div class="orch-left">',
      '<div class="back-row">',
        '<button class="back-btn" onclick="navigateTo(\'/tasks\')">',
          '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回任务',
        '</button>',
      '</div>',

      // Requirement
      '<div class="orch-card">',
        '<div class="orch-card-title">// 需求输入</div>',
        '<textarea class="orch-req-input" id="orch-req" placeholder="输入你的复杂需求..."></textarea>',
        '<div class="orch-btn-row">',
          '<button class="orch-btn primary" id="orch-start-btn" onclick="startNewJob()">',
            '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始编排',
          '</button>',
          '<button class="orch-btn" onclick="clearInput()">清空</button>',
        '</div>',
      '</div>',

      // Agent config
      '<div class="orch-card">',
        '<div class="orch-card-title">// Agent 配置</div>',
        '<label class="agent-toggle"><input type="checkbox" id="agent-search" checked><div class="agent-check-box"></div><div class="agent-meta"><div class="agent-dot search"></div><span class="agent-name">Search Worker</span></div></label>',
        '<label class="agent-toggle"><input type="checkbox" id="agent-rag" checked><div class="agent-check-box"></div><div class="agent-meta"><div class="agent-dot rag"></div><span class="agent-name">RAG Worker</span></div></label>',
        '<label class="agent-toggle"><input type="checkbox" id="agent-coder" checked><div class="agent-check-box"></div><div class="agent-meta"><div class="agent-dot coder"></div><span class="agent-name">Coder</span></div></label>',
      '</div>',

      // Quality
      '<div class="orch-card">',
        '<div class="orch-card-title">// 质量阈值</div>',
        '<div class="quality-row">',
          '<input type="range" class="quality-slider" id="orch-quality" min="5" max="10" step="0.5" value="8">',
          '<span class="quality-val" id="orch-quality-val">8.0</span>',
        '</div>',
      '</div>',

      // Job history
      '<div class="orch-card" style="flex:1;min-height:0;display:flex;flex-direction:column;">',
        '<div class="orch-card-title">// 任务历史 <span id="job-count" style="font-size:10px;color:var(--noir-muted);font-weight:normal;margin-left:6px;"></span></div>',
        '<div class="job-list" id="job-list">',
          '<div class="job-empty">暂无任务</div>',
        '</div>',
      '</div>',
    '</div>',

    // RIGHT
    '<div class="orch-right">',

      // Progress bar
      '<div class="progress-header" id="progress-header" style="display:none">',
        '<span class="progress-label">整体进度</span>',
        '<div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>',
        '<span class="progress-pct" id="progress-pct">0%</span>',
        '<span class="step-badge" id="step-badge">等待开始</span>',
        '<button class="orch-btn cancel-btn" id="cancel-btn" onclick="cancelSelectedJob()" style="flex:none;padding:5px 12px;font-size:11px;">取消</button>',
      '</div>',

      // Step timeline (collapsible)
      '<div class="step-timeline" id="step-timeline">',
        '<div class="step-timeline-header" onclick="toggleTimeline()">',
          '<span class="step-timeline-title">// 执行步骤</span>',
          '<span class="step-timeline-toggle" id="timeline-toggle">&#9660;</span>',
        '</div>',
        '<div class="step-list" id="step-list">',
          '<div class="orch-empty" id="step-empty">',
            '<svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>',
            '选择任务查看步骤',
          '</div>',
        '</div>',
      '</div>',

      // Logs
      '<div class="orch-card orch-logs">',
        '<div class="orch-card-title">// 执行日志</div>',
        '<div class="log-body" id="log-body">',
          '<div class="orch-empty" id="log-empty">',
            '<svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>暂无日志',
          '</div>',
        '</div>',
      '</div>',

      // Result
      '<div class="orch-card orch-result">',
        '<div class="orch-card-title">// 最终结果</div>',
        '<div class="result-quality" id="result-quality-row" style="display:none">',
          '<div class="quality-bar-wrap"><div class="quality-bar" id="quality-bar"></div></div>',
          '<span class="quality-score-label" id="quality-score-label">0.0</span>',
          '<span class="result-badge" id="result-badge"></span>',
        '</div>',
        '<div class="result-body" id="result-body">',
          '<div class="orch-empty" id="result-empty">',
            '<svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>等待执行结果',
          '</div>',
        '</div>',
      '</div>',
    '</div>',
  '</div>'
].join('');

// ═══════════════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════════════
var _selectedJobId  = null;
var _streamReaders  = {};     // jobId → { cancelFn }
var _timelineOpen   = true;
var _steps          = [];      // [{id, name, desc, status, time}]
var _stepIdx        = 0;       // current active step index
var _listPollTimer  = null;

// ═══════════════════════════════════════════════════════════════════════════
//  Page lifecycle
// ═══════════════════════════════════════════════════════════════════════════
function orchestrateOnShow() {
  refreshJobList();
  if (!_listPollTimer) _listPollTimer = setInterval(refreshJobList, 3000);
}
function orchestrateOnSave() { return null; }
registerSPA('/orchestrate', ORCHESTRATE_CONTENT, orchestrateOnShow, orchestrateOnSave);
injectStyles();
initPage('/orchestrate');
initSPA('/orchestrate');

// Quality slider
var qualSlider = document.getElementById('orch-quality');
if (qualSlider) qualSlider.addEventListener('input', function() {
  var v = document.getElementById('orch-quality-val');
  if (v) v.textContent = parseFloat(this.value).toFixed(1);
});

// ═══════════════════════════════════════════════════════════════════════════
//  Timeline toggle
// ═══════════════════════════════════════════════════════════════════════════
function toggleTimeline() {
  _timelineOpen = !_timelineOpen;
  var tl = document.getElementById('step-timeline');
  if (tl) tl.classList.toggle('collapsed', !_timelineOpen);
  var toggle = document.getElementById('timeline-toggle');
  if (toggle) toggle.innerHTML = _timelineOpen ? '&#9660;' : '&#9654;';
}

// ═══════════════════════════════════════════════════════════════════════════
//  Step definitions
// ═══════════════════════════════════════════════════════════════════════════
var STEP_DEFS = [
  { id: 'supervisor_plan',  name: 'Supervisor 规划',    desc: '拆解需求，生成执行计划', color: '#c0392b' },
  { id: 'search_worker',    name: 'Search Worker',     desc: '并行执行 Tavily 搜索', color: '#4ade80' },
  { id: 'rag_worker',        name: 'RAG Worker',         desc: '并行执行记忆检索',     color: '#60a5fa' },
  { id: 'coder',             name: 'Coder Worker',       desc: '基于上下文生成代码',   color: '#facc15' },
  { id: 'quality_eval',      name: '质量评估',            desc: '综合评分，检查阈值',  color: '#c0392b' },
  { id: 'self_heal',         name: '自修复',              desc: '低质量结果自修复',     color: '#facc15' },
  { id: 'final_result',      name: '最终结果',            desc: '汇总报告，输出结果',  color: '#2ecc71' },
];

function buildStepList(enabledAgents) {
  _steps = [];
  // Supervisor always first
  _steps.push({ ...STEP_DEFS[0], status: 'pending' });
  if (enabledAgents && enabledAgents.includes('search')) _steps.push({ ...STEP_DEFS[1], status: 'pending' });
  if (enabledAgents && enabledAgents.includes('rag'))    _steps.push({ ...STEP_DEFS[2], status: 'pending' });
  if (enabledAgents && enabledAgents.includes('coder'))  _steps.push({ ...STEP_DEFS[3], status: 'pending' });
  _steps.push({ ...STEP_DEFS[4], status: 'pending' });
  _steps.push({ ...STEP_DEFS[6], status: 'pending' });
  _stepIdx = 0;
  renderStepList();
}

function updateStepStatus(eventType, newStatus) {
  var idx = _steps.findIndex(function(s) { return s.id === eventType; });
  if (idx === -1) return;
  _steps[idx].status = newStatus;
  if (newStatus === 'active') _stepIdx = idx;
  renderStepList();
  updateProgress();
}

function updateProgress() {
  var done = _steps.filter(function(s) { return s.status === 'done'; }).length;
  var pct  = _steps.length ? Math.round((done / _steps.length) * 100) : 0;
  var fill = document.getElementById('progress-fill');
  var pctEl = document.getElementById('progress-pct');
  var badge = document.getElementById('step-badge');
  if (fill) {
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (pct >= 100 ? ' high' : '');
  }
  if (pctEl) pctEl.textContent = pct + '%';
  if (badge && _steps[_stepIdx]) {
    badge.textContent = _steps[_stepIdx].name;
  }
}

function renderStepList() {
  var listEl = document.getElementById('step-list');
  var emptyEl = document.getElementById('step-empty');
  if (!listEl) return;

  if (!_steps.length) {
    listEl.innerHTML = '';
    if (emptyEl) emptyEl.style.display = '';
    return;
  }
  if (emptyEl) emptyEl.style.display = 'none';

  listEl.innerHTML = '';
  _steps.forEach(function(step, i) {
    var icon = step.status === 'done' ? '&#10003;' :
               step.status === 'active' ? '&#8226;' :
               step.status === 'fail' ? '&#10007;' : (i + 1);
    var item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML =
      '<div class="step-icon ' + step.status + '">' + icon + '</div>' +
      '<div class="step-content">' +
        '<div class="step-name">' + esc(step.name) + '</div>' +
        '<div class="step-desc">' + esc(step.desc) + '</div>' +
      '</div>' +
      '<div class="step-time" id="step-time-' + i + '"></div>';
    listEl.appendChild(item);
  });
}

function setStepTime(i, t) {
  var el = document.getElementById('step-time-' + i);
  if (el) el.textContent = t;
}

// ═══════════════════════════════════════════════════════════════════════════
//  Start new job
// ═══════════════════════════════════════════════════════════════════════════
function startNewJob() {
  var reqEl  = document.getElementById('orch-req');
  var req    = reqEl ? reqEl.value.trim() : '';
  if (!req) { toast('请输入需求', 'error'); return; }

  var enabled = [];
  if (document.getElementById('agent-search').checked) enabled.push('search');
  if (document.getElementById('agent-rag').checked)    enabled.push('rag');
  if (document.getElementById('agent-coder').checked)   enabled.push('coder');
  if (!enabled.length) { toast('请至少选择一个 Agent', 'error'); return; }

  var qualityThreshold = parseFloat(document.getElementById('orch-quality').value);
  var btn = document.getElementById('orch-start-btn');
  if (btn) { btn.disabled = true; btn.classList.add('running'); btn.innerHTML = '<span class="spinner"></span> 创建任务...'; }

  fetch('/api/orchestrate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ requirement: req, enabled_agents: enabled, quality_threshold: qualityThreshold }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.job_id) throw new Error(data.detail || '创建任务失败');
    if (btn) { btn.disabled = false; btn.classList.remove('running'); btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始编排'; }
    selectJob(data.job_id);
    refreshJobList();
  })
  .catch(function(err) {
    console.error('Create job error', err);
    if (btn) { btn.disabled = false; btn.classList.remove('running'); btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始编排'; }
    toast('创建任务失败: ' + err.message, 'error');
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  Select a job
// ═══════════════════════════════════════════════════════════════════════════
function selectJob(jobId) {
  if (_selectedJobId && _streamReaders[_selectedJobId]) {
    _streamReaders[_selectedJobId].cancelFn();
    delete _streamReaders[_selectedJobId];
  }
  _selectedJobId = jobId;
  clearRightPanel();
  fetchJobAndStream(jobId);
}

// ═══════════════════════════════════════════════════════════════════════════
//  Fetch job + start SSE
// ═══════════════════════════════════════════════════════════════════════════
function fetchJobAndStream(jobId) {
  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jobId))
    .then(function(r) { return r.json(); })
    .then(function(job) {
      if (job.error) { console.error(job.error); return; }

      // Show progress bar
      var ph = document.getElementById('progress-header');
      if (ph) ph.style.display = '';

      // Build steps from enabled agents
      buildStepList(job.enabled_agents || []);
      updateStepStatus('supervisor_plan', 'active');

      // Show history events
      if (job.events && job.events.length) {
        job.events.forEach(function(ev) { handleJobEvent(jobId, ev.type, ev.data); });
      }

      // Result if done
      if (job.status === 'done' && job.result)     { onFinalResult(job.result); }
      if (job.status === 'failed')                   { onJobDone('failed'); }
      if (job.status === 'cancelled')               { onJobDone('cancelled'); }

      // SSE stream
      if (job.status === 'pending' || job.status === 'running') openJobStream(jobId);
    })
    .catch(function(err) { console.error('Fetch job error', err); });
}

function openJobStream(jobId) {
  var ac = new AbortController();
  _streamReaders[jobId] = { cancelFn: function() { ac.abort(); } };

  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jobId) + '/events', { signal: ac.signal })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      pump(jobId, resp.body.getReader());
    })
    .catch(function(err) {
      if (err.name === 'AbortError') return;
      console.error('Job stream error', err);
      setTimeout(function() {
        if (_selectedJobId === jobId) fetchJobAndStream(jobId);
      }, 2000);
    });

  function pump(jid, rdr) {
    var decoder  = new TextDecoder();
    var buffer   = '';
    var tick = function() {
      if (!rdr) return;
      rdr.read().then(function(result) {
        if (result.done) { onStreamDone(jid); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          // SSE format: data: {"type": "...", "data": {...}}
          if (line.startsWith('data: ')) {
            var payload = line.slice(6);
            try {
              var data = JSON.parse(payload);
              handleJobEvent(jid, data.type || '?', data.data || data);
            } catch(e) { console.error('Parse SSE data error', e, payload); }
          }
        }
        tick();
      }).catch(function(err) { console.error('Pump error', err); onStreamDone(jid); });
    };
    tick();
  }

  function onStreamDone(jid) {
    if (_streamReaders[jid]) delete _streamReaders[jid];
    refreshJobList();
    if (_selectedJobId === jid) {
      setTimeout(function() { fetchJobAndStream(jid); }, 1500);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  Refresh job list
// ═══════════════════════════════════════════════════════════════════════════
function refreshJobList() {
  fetch('/api/orchestrate/jobs')
    .then(function(r) { return r.json(); })
    .then(function(data) { renderJobList(data.jobs || []); })
    .catch(function(err) { console.error('List jobs error', err); });
}

function renderJobList(jobs) {
  var listEl = document.getElementById('job-list');
  if (!listEl) return;
  var countEl = document.getElementById('job-count');
  if (countEl) countEl.textContent = jobs.length ? jobs.length + ' 个任务' : '';

  if (!jobs.length) {
    listEl.innerHTML = '<div class="job-empty">暂无任务</div>'; return;
  }
  listEl.innerHTML = '';
  jobs.forEach(function(job) {
    var item = document.createElement('div');
    item.className = 'job-item' + (job.job_id === _selectedJobId ? ' selected' : '');
    item.dataset.jobId = job.job_id;
    var q = job.result ? job.result.quality_score : null;
    var qHtml = '';
    if (q !== null && q !== undefined) {
      var qcls = job.result.passed ? 'high' : 'fail';
      qHtml = '<span class="job-quality ' + qcls + '">' + parseFloat(q).toFixed(1) + '</span>';
    }
    var statusLabel = { pending:'等待', running:'运行中', done:'完成', cancelled:'已取消', failed:'失败' }[job.status] || job.status;
    item.innerHTML =
      '<div class="job-status-dot ' + job.status + '"></div>' +
      '<div class="job-info">' +
        '<div class="job-req-preview" title="' + esc(job.requirement) + '">' + esc(job.requirement) + '</div>' +
        '<div class="job-meta">' + statusLabel + ' · ' + (job.created_at || '').slice(11, 16) + '</div>' +
      '</div>' + qHtml;
    item.addEventListener('click', function() { selectJob(job.job_id); });
    listEl.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  Handle SSE event for selected job
// ═══════════════════════════════════════════════════════════════════════════
function handleJobEvent(jobId, eventType, data) {
  if (jobId !== _selectedJobId) return;
  var d = (data && data.data !== undefined) ? data.data : (data || {});
  switch (eventType) {
    case 'supervisor_plan':  onSupervisorPlan(d);   break;
    case 'worker_start':     onWorkerStart(d);     break;
    case 'worker_progress':  onWorkerProgress(d);  break;
    case 'worker_done':      onWorkerDone(d);       break;
    case 'worker_rejected':  onWorkerRejected(d);   break;
    case 'quality_score':    onQualityScore(d);     break;
    case 'self_healing':     onSelfHealing(d);      break;
    case 'loop_warning':     onLoopWarning(d);      break;
    case 'human_intervention': onHumanIntervention(d); break;
    case 'final_result':     onFinalResult(d);      break;
    case 'error':            onOrchError(d);        break;
    case 'done':             onJobDone(d.status || 'done'); break;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  Event handlers
// ═══════════════════════════════════════════════════════════════════════════
function onSupervisorPlan(d) {
  hideLogEmpty();
  appendLog('supervisor', '正在拆解任务...');
  if (d.tasks && d.tasks.length) {
    d.tasks.forEach(function(t) {
      var short = (t.assigned_agent || '').replace('_worker', '') || '?';
      appendLog('supervisor', '计划: ' + t.description);
      appendLog('system', '  → ' + short + ' (' + t.task_id + ')');
    });
  }
}

function onWorkerStart(d) {
  var key = normKey(d.agent);
  updateStepStatus(key, 'active');
  appendLog(key, '开始执行: ' + (d.task_description || d.description || ''));
}

function onWorkerProgress(d) {
  var key = normKey(d.agent);
  appendLog(key, d.message || '进行中...');
}

function onWorkerDone(d) {
  var key   = normKey(d.agent);
  var score = parseFloat(d.quality_score || 0);
  updateStepStatus(key, 'done');
  appendLog(key, '完成 (质量: ' + score.toFixed(1) + '/10)');
}

function onWorkerRejected(d) {
  var key = normKey(d.agent);
  updateStepStatus(key, 'fail');
  appendLog(key, '被驳回: ' + (d.reason || '未知原因'));
}

function onSelfHealing(d) {
  updateStepStatus('self_heal', 'active');
  appendLog('self_healer', '自修复 #' + (d.attempt || '?') + ': ' + (d.reason || ''));
}

function onQualityScore(d) {
  updateStepStatus('quality_eval', 'active');
  appendLog('system', '整体质量: ' + parseFloat(d.score || 0).toFixed(1) + '/10 ' + (d.note || ''));
  updateStepStatus('quality_eval', 'done');
}

function onLoopWarning(d) {
  appendLog('system', '⚠️ 循环警告: ' + (d.loop_count || 0) + ' 次');
}

function onHumanIntervention(d) {
  appendLog('system', '⚠️ 人工介入: ' + (d.message || ''));
}

function onOrchError(d) {
  appendLog('system', '错误: ' + (d.message || JSON.stringify(d)));
}

function onFinalResult(d) {
  updateStepStatus('final_result', 'active');
  var score  = parseFloat(d.quality_score || 0);
  var passed = d.passed;

  var qRow  = document.getElementById('result-quality-row');
  var bar   = document.getElementById('quality-bar');
  var label = document.getElementById('quality-score-label');
  var badge = document.getElementById('result-badge');
  if (qRow)  qRow.style.display = 'flex';
  if (bar)   { bar.style.width = (score * 10) + '%'; bar.className = 'quality-bar' + (score >= 8 ? ' high' : ''); }
  if (label) { label.textContent = score.toFixed(1); label.className = 'quality-score-label' + (score >= 8 ? ' high' : ''); }
  if (badge) { badge.className = 'result-badge ' + (passed ? 'pass' : 'fail'); badge.textContent = passed ? '✓ 通过' : '✗ 未达标'; }

  hideResultEmpty();
  var body = document.getElementById('result-body');
  if (body) body.innerHTML = '<div class="result-content">' + esc(d.summary || '') + '</div>';

  updateStepStatus('final_result', 'done');
  onJobDone('done');
  refreshJobList();
}

function onJobDone(finalStatus) {
  var badge = document.getElementById('step-badge');
  if (badge) badge.textContent = finalStatus === 'done' ? '已完成 ✓' : finalStatus === 'failed' ? '失败 ✗' : '已取消';
  var cancelBtn = document.getElementById('cancel-btn');
  if (cancelBtn) cancelBtn.style.display = 'none';
  // Mark all pending steps as fail
  _steps.forEach(function(s) {
    if (s.status === 'pending' || s.status === 'active') updateStepStatus(s.id, finalStatus === 'done' ? 'done' : 'fail');
  });
  updateProgress();
  refreshJobList();
}

// ═══════════════════════════════════════════════════════════════════════════
//  Cancel job
// ═══════════════════════════════════════════════════════════════════════════
function cancelSelectedJob() {
  if (!_selectedJobId) return;
  var jid = _selectedJobId;
  if (_streamReaders[jid]) { _streamReaders[jid].cancelFn(); delete _streamReaders[jid]; }
  fetch('/api/orchestrate/jobs/' + encodeURIComponent(jid), { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function() {
      toast('任务已取消', 'info');
      appendLog('system', '任务已被取消');
      onJobDone('cancelled');
    })
    .catch(function(err) { toast('取消失败: ' + err.message, 'error'); });
}

// ═══════════════════════════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════════════════════════
function normKey(agent) {
  if (!agent) return 'system';
  if (agent === 'search_worker' || agent === 'search') return 'search_worker';
  if (agent === 'rag_worker'    || agent === 'rag')     return 'rag_worker';
  if (agent === 'coder')                              return 'coder';
  if (agent === 'self_healer')                       return 'self_healer';
  return 'system';
}

function clearRightPanel() {
  _steps = [];
  _stepIdx = 0;
  var ph = document.getElementById('progress-header');
  if (ph) ph.style.display = 'none';
  var cancelBtn = document.getElementById('cancel-btn');
  if (cancelBtn) cancelBtn.style.display = '';
  clearLogs();
  clearResult();
  renderStepList();
}

function hideLogEmpty()    { var el = document.getElementById('log-empty');    if (el) el.style.display = 'none'; }
function hideResultEmpty() { var el = document.getElementById('result-empty'); if (el) el.style.display = 'none'; }

function resetTimeline() {
  _steps = [];
  renderStepList();
}

function appendLog(agent, message) {
  var body = document.getElementById('log-body');
  if (!body) return;
  hideLogEmpty();
  var now  = new Date();
  var time = [now.getHours(), now.getMinutes(), now.getSeconds()].map(function(n) { return String(n).padStart(2,'0'); }).join(':');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML =
    '<span class="log-time">' + time + '</span>' +
    '<span class="log-agent ' + agent + '">[' + agent.replace('_worker','') + ']</span>' +
    '<span class="log-msg">' + esc(message) + '</span>';
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

function clearLogs() {
  var body = document.getElementById('log-body');
  if (body) body.innerHTML = '<div class="orch-empty" id="log-empty"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>暂无日志</div>';
}

function clearResult() {
  var body = document.getElementById('result-body');
  if (body) body.innerHTML = '<div class="orch-empty" id="result-empty"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>等待执行结果</div>';
  var qRow = document.getElementById('result-quality-row');
  if (qRow) qRow.style.display = 'none';
}

function clearInput() {
  var req = document.getElementById('orch-req');
  if (req) req.value = '';
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
