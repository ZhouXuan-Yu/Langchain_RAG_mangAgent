<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话 - Langchain_RAG</title>
  <script src="/lib/shared.js"></script>
  <script src="/lib/kb_spa.js"></script>
  <style>
    /* 对话页专用样式 */
    .chat-layout {
      display: grid;
      grid-template-columns: 1fr 280px 260px;
      gap: 12px;
      padding: 16px 20px 20px;
      height: 100%;
      overflow: hidden;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .chat-panel-left {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .chat-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .toolbar-left { display: flex; align-items: center; gap: 10px; }
    .toolbar-right { display: flex; align-items: center; gap: 6px; }

    .toolbar-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .toolbar-btn:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: var(--elevated);
    }

    .toolbar-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    .toolbar-stat {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-stat .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
    }

    .toolbar-stat.active .dot { background: #4ade80; }
    .toolbar-stat.busy .dot { background: #f87171; animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .model-select {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }

    .model-select option { background: #1a1a1a; }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; align-items: flex-start; gap: 10px; animation: msgIn 250ms cubic-bezier(0.2, 0, 0, 1) both; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }

    .msg-av { width: 28px; height: 28px; border-radius: 6px; background: var(--elevated); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .msg-av svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 1.5; }

    .msg-bub { max-width: 80%; padding: 11px 15px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.6; }
    .msg.user .msg-bub { background: var(--elevated); border: 1px solid var(--border); border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md); }
    .msg.assistant .msg-bub { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px; }
    .msg-bub p { margin: 0 0 6px; }
    .msg-bub p:last-child { margin-bottom: 0; }
    .msg-bub pre { background: rgba(0,0,0,0.25); border-radius: 6px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.5; }
    .msg-bub code { font-family: var(--font-mono); font-size: 12px; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px; }
    .msg-bub pre code { background: transparent; padding: 0; }

    .loading-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
    .loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dotPulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }

    .chat-input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input-row { display: flex; align-items: flex-end; gap: 10px; }
    .chat-text-input {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 10px 16px;
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      resize: none;
      transition: border-color 200ms ease;
      line-height: 1.5;
      min-height: 44px;
      max-height: 120px;
    }
    .chat-text-input::placeholder { color: var(--muted); }
    .chat-text-input:focus { border-color: var(--border-h); }
    .chat-send-btn {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      background: var(--elevated); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 180ms ease;
    }
    .chat-send-btn:hover:not(:disabled) { background: var(--dim); border-color: var(--border-h); color: var(--text); }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    .side-panels { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    .side-panel-card { display: flex; flex-direction: column; border-radius: var(--radius-lg); overflow: hidden; }
    .side-panel-card:first-child { flex: 1.2; }
    .side-panel-card:last-child { flex: 1; }

    .tool-entry { padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 8px; background: var(--elevated); border: 1px solid var(--border); position: relative; }
    .tool-entry:last-child { margin-bottom: 0; }
    .tool-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .tool-entry-name { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }
    .tool-entry-seq { font-size: 10px; font-family: var(--font-mono); color: var(--border-h); }
    .tool-entry-data { font-size: 11px; font-family: var(--font-mono); color: var(--muted); white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow: hidden; line-height: 1.4; }

    .mem-card { padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 8px; background: var(--elevated); border: 1px solid var(--border); }
    .mem-card:last-child { margin-bottom: 0; }
    .mem-cat { font-size: 10px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .mem-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .mem-row { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
    .mem-level { font-size: 11px; font-family: var(--font-mono); color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .mem-star { color: #f59e0b; font-size: 10px; }
    .mem-del {
      width: 20px; height: 20px; border-radius: 4px;
      background: transparent; border: 1px solid transparent;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 150ms ease;
    }
    .mem-del:hover { background: rgba(139,0,0,0.1); border-color: rgba(139,0,0,0.25); color: #c0392b; }

    .kb-shortcut-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
    }

    .kb-shortcut-hint kbd {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* 统计面板 */
    .kb-stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .kb-stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .kb-stat-item .val { color: var(--text); font-weight: 500; }

    .kb-divider { width: 1px; height: 14px; background: var(--border); }

    /* 可用工具目录 */
    .tool-details { margin-bottom: 4px; }
    .tool-details > summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      padding: 2px 0;
      user-select: none;
    }
    .tool-details > summary::-webkit-details-marker { display: none; }
    .tool-details > summary::after {
      content: '▼';
      font-size: 8px;
      opacity: 0.5;
      transition: transform 200ms;
    }
    .tool-details[open] > summary::after { transform: rotate(180deg); }
    .tool-intro {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.45;
      margin: 8px 0 10px;
    }
    .tool-catalog { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .tool-card-static {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--elevated);
      border: 1px solid var(--border);
    }
    .tool-card-static .nm {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #a78bfa;
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }
    .tool-card-static .desc { font-size: 11px; color: var(--muted); line-height: 1.45; }
    .tool-log-sep {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 6px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    /* 工具调用区域 - 可滚动容器 */
    .tool-log-container {
      flex: 1;
      overflow-y: auto;
      min-height: 80px;
      max-height: 300px;
    }
    .tool-log-container::-webkit-scrollbar { width: 4px; }
    .tool-log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* 单次对话任务块（避免 summary 内 SVG 无尺寸撑满整栏） */
    .task-block {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--elevated);
      overflow: hidden;
    }
    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      list-style: none;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      background: rgba(0,0,0,0.2);
    }
    .task-header::-webkit-details-marker { display: none; }
    .task-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .task-header-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .task-header-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      opacity: 0.85;
    }
    .task-header-title { color: var(--text); font-weight: 500; }
    .task-header-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .task-toggle { font-size: 8px; opacity: 0.5; }
    .task-body { padding: 6px 8px 10px; border-top: 1px solid var(--border); }

    .tool-card {
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 11px;
    }
    .tool-card > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      cursor: pointer;
      list-style: none;
      font-family: var(--font-mono);
    }
    .tool-card > summary::-webkit-details-marker { display: none; }
    .tool-card-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .tool-name { color: #a78bfa; font-weight: 500; }
    .tool-seq { font-size: 10px; color: var(--border-h); }
    .tool-toggle-icon { font-size: 8px; opacity: 0.5; }
    .tool-card-content { padding: 0 8px 8px; font-family: var(--font-mono); font-size: 10px; }
    .tool-data-label, .tool-result-label { color: var(--border-h); margin-top: 6px; margin-bottom: 2px; }
    .tool-data-value, .tool-result-value {
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    .tool-result-value { color: #86efac; }
    .tool-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
    }
    .tool-status-dot.done { background: #4ade80; }
    .tool-status-dot.busy { animation: pulse 1s ease-in-out infinite; }

    /* 单次问答的工具调用折叠块 */
    .qa-tool-block {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--elevated);
    }
    .qa-tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      background: rgba(0,0,0,0.15);
    }
    .qa-tool-header:hover { background: rgba(0,0,0,0.25); }
    .qa-tool-header .qa-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qa-tool-header .qa-toggle {
      font-size: 8px;
      transition: transform 200ms;
    }
    .qa-tool-block[open] .qa-toggle { transform: rotate(180deg); }
    .qa-tool-body { padding: 6px 10px; }

    .tool-entry { padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border); position: relative; }
    .tool-entry:last-child { margin-bottom: 0; }
    .tool-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .tool-entry-name { font-size: 11px; font-family: var(--font-mono); color: #a78bfa; }
    .tool-entry-seq { font-size: 10px; font-family: var(--font-mono); color: var(--border-h); }
    .tool-entry-data { font-size: 10px; font-family: var(--font-mono); color: var(--muted); white-space: pre-wrap; word-break: break-all; max-height: 50px; overflow: hidden; line-height: 1.4; }
    .tool-entry-result { font-size: 10px; font-family: var(--font-mono); color: #4ade80; white-space: pre-wrap; word-break: break-all; max-height: 40px; overflow: hidden; line-height: 1.4; margin-top: 4px; border-top: 1px dashed var(--border); padding-top: 4px; }

    @media (max-width: 1100px) {
      .chat-layout { grid-template-columns: 1fr 240px; }
      .side-panel-card:last-child { display: none; }
    }
    @media (max-width: 700px) {
      .chat-layout { grid-template-columns: 1fr; }
      .side-panels { display: none; }
    }
  </style>
</head>
<body class="glass-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content">
    <!-- SPA: 内容由 registerSPA / navigateTo 动态替换 -->
  </div>
</div>

<script>
// ── 对话页内容模板 ─────────────────────────────────────────────
var CHAT_CONTENT = [
  '<div class="chat-layout">',
    '<div class="chat-panel-left">',
      '<div class="chat-toolbar">',
        '<div class="toolbar-left">',
          '<span class="toolbar-stat" id="stat-indicator"><span class="dot"></span><span id="stat-text">空闲</span></span>',
          '<select class="model-select" id="chat-model-select" title="切换模型">',
            '<option value="deepseek-chat">V3</option>',
            '<option value="deepseek-reasoner">R1</option>',
          '</select>',
        '</div>',

          '<span class="toolbar-stat" id="msg-count-stat"><span id="msg-count">0</span> 条消息</span>',
          '<button class="toolbar-btn" id="chat-stop-btn" onclick="chatStop()" title="中断生成" style="display:none">',
            '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>',
            '停止',
          '</button>',
          '<button class="toolbar-btn" onclick="chatExport()" title="导出对话">',
            '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            '导出',
          '</button>',
          '<button class="toolbar-btn" onclick="chatClearAll()" title="清空对话">',
            '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
            '清空',
          '</button>',
        '</div>',
      '</div>',
      '<div class="chat-panel glass" style="flex:1;min-height:0">',
        '<div class="chat-msgs" id="chat-msgs">',
          '<div class="empty-state" id="chat-empty">',
            '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
            '<p>发送消息开始对话<br><span style="opacity:0.5;font-size:11px">Agent 会记住你的偏好和上下文</span></p>',

        '</div>',
        '<div class="chat-input-area">',
          '<div class="chat-input-row">',

            '<button class="chat-send-btn" id="chat-send-btn" onclick="chatSend()">',
              '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
            '</button>',
          '</div>',
          '<div class="kb-shortcut-hint"><kbd>Enter</kbd> 发送 &nbsp; <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>',
        '</div>',
      '</div>',
    '</div>',
    '<div class="side-panel-card glass">',
      '<div class="panel-hdr"><span class="panel-title">工具</span></div>',
      '<div class="panel-body">',
        '<details class="tool-details">',
          '<summary><span>可用工具</span><span class="panel-count">7</span></summary>',
          '<p class="tool-intro">以下为 Agent 可自动调用的工具（由模型根据问题选择）。</p>',
          '<div class="tool-catalog">',
            '<div class="tool-card-static"><div class="nm">memory_search</div><div class="desc">从长期记忆（向量库）中检索用户相关历史与偏好。</div></div>',
            '<div class="tool-card-static"><div class="nm">knowledge_base_search</div><div class="desc">从知识库已上传文档（PDF/Word 等）中语义检索片段。</div></div>',
            '<div class="tool-card-static"><div class="nm">save_memory</div><div class="desc">将重要事实写入长期记忆。</div></div>',
            '<div class="tool-card-static"><div class="nm">web_search</div><div class="desc">联网搜索时效性信息。</div></div>',
            '<div class="tool-card-static"><div class="nm">browse_page</div><div class="desc">抓取指定网页正文。</div></div>',
            '<div class="tool-card-static"><div class="nm">calculator</div><div class="desc">计算数学表达式。</div></div>',
            '<div class="tool-card-static"><div class="nm">process_image</div><div class="desc">处理或描述图像内容。</div></div>',
          '</div>',
        '</details>',
        '<div class="tool-log-sep"><span>本次调用</span><span class="panel-count" id="tool-num">0</span></div>',
        '<div class="tool-log-container">',

// ── 对话页：页面展示回调 ───────────────────────────────────────
function chatOnShow(savedState) {
  var sel = document.getElementById('chat-model-select');
  if (sel) {
    sel.value = G.model;
    sel.addEventListener('change', function(e) {
      var m = e.target.value;
      if (m === G.model) return;
      fetch('/api/model/switch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model: m})
      }).then(function(r) {
        if (r.ok) { G.model = m; toast('模型已切换'); renderHeader(_SPA.currentPath || '/'); }
        else toast('切换失败', 'error');
      }).catch(function() { toast('切换失败', 'error'); });
    });
  }

  console.log('[SPA chatOnShow] savedState keys:', savedState ? Object.keys(savedState) : 'none', '| msgs:', G.msgs.length);
  if (savedState) {
    if (savedState.msgsHtml && document.getElementById('chat-msgs')) {
      document.getElementById('chat-msgs').innerHTML = savedState.msgsHtml;
      G.msgs = savedState.msgs || [];
      G.tools = savedState.tools || [];
      document.getElementById('tool-num').textContent = G.tools.length;
    }
    // 恢复工具容器
    if (savedState.toolContainerHtml) {
      var container = document.querySelector('.tool-log-container');
      if (container) container.innerHTML = savedState.toolContainerHtml;
    }
    if (document.getElementById('msg-count')) {
      document.getElementById('msg-count').textContent = G.msgs.length;
    }
  }

  // 自动调整输入框高度
  var inp = document.getElementById('chat-text-input');
  if (inp) {
    inp.addEventListener('input', function() {
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
    });
  }

  loadChatMem();
  // 从服务器加载历史消息（当前 thread_id 的所有对话记录）
  // 如果 savedState 已有较多消息（>2，即正常导航恢复），跳过；否则强制从服务器拉取
  var savedMsgCount = (savedState && savedState.msgs) ? savedState.msgs.length : 0;
  if (savedMsgCount <= 2) {
    loadChatHistory();
  }
}

// ── 从服务器加载历史消息并渲染 ─────────────────────────────────
function loadChatHistory() {
  if (!G.threadId) {
    // #region DBG-loadChatHistory-no-thread
    fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_H1',location:'index.html:loadChatHistory',message:'H1-NO-THREAD: G.threadId is empty, skipping',data:{threadId:G.threadId},timestamp:Date.now(),runId:'debug',hypothesisId:'H1'})}).catch(function(){});
    // #endregion
    return;
  }
  // #region DBG-loadChatHistory-request
  fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_H1_req',location:'index.html:loadChatHistory',message:'H1-REQ: fetching session detail',data:{threadId:G.threadId},timestamp:Date.now(),runId:'debug',hypothesisId:'H1'})}).catch(function(){});
  // #endregion
  fetch('/api/session/' + encodeURIComponent(G.threadId) + '/detail').then(function(r) {
    // #region DBG-loadChatHistory-status
    fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_H1_resp',location:'index.html:loadChatHistory',message:'H1-RESP: HTTP status',data:{status:r.status,ok:r.ok},timestamp:Date.now(),runId:'debug',hypothesisId:'H1'})}).catch(function(){});
    // #endregion
    if (!r.ok) return null;
    return r.json();
  }).then(function(data) {
    // #region DBG-loadChatHistory-data
    fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_H1_data',location:'index.html:loadChatHistory',message:'H1-DATA: API response structure',data:{hasData:!!data,messagesLen:data?data.messages.length:0,toolEventsLen:data?data.tool_events.length:0,turnsLen:data?data.turns.length:0,firstTurnHasAssistant:data&&data.turns&&data.turns[0]?!!data.turns[0].assistant:false,firstTurnToolsLen:data&&data.turns&&data.turns[0]?data.turns[0].tools.length:0},timestamp:Date.now(),runId:'debug',hypothesisId:'H1'})}).catch(function(){});
    // #endregion
    if (!data || !data.turns || !data.turns.length) {
      // #region DBG-loadChatHistory-empty
      fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_H1_empty',location:'index.html:loadChatHistory',message:'H1-EMPTY: no turns in response',data:{threadId:G.threadId},timestamp:Date.now(),runId:'debug',hypothesisId:'H1'})}).catch(function(){});
      // #endregion
      return;
    }
    var box = document.getElementById('chat-msgs');
    if (!box) return;

    var empty = document.getElementById('chat-empty');
    if (empty) empty.remove();

    // 记录已有的消息数，避免重复追加
    var baseCount = G.msgs.length;

    data.turns.forEach(function(turn, tIdx) {
      // 用户消息
      G.msgs.push({role: 'user', content: turn.user || ''});
      renderHistMsg(box, 'user', turn.user || '');

      // AI 回复
      if (turn.assistant) {
        G.msgs.push({role: 'assistant', content: turn.assistant});
        renderHistMsg(box, 'assistant', turn.assistant);
      }

      // 工具调用（渲染到右侧工具面板）
      if (turn.tools && turn.tools.length) {
        var histToolSeq = G.tools.length;
        turn.tools.forEach(function(t) {
          G.tools.push({id: 'hist-' + histToolSeq, name: t.name || t.tool_name || '?'});
          histToolSeq++;
        });
        renderHistToolPanel(turn.tools, tIdx);
      }
    });

    updateMsgCount();
    var toolNumEl = document.getElementById('tool-num');
    if (toolNumEl) toolNumEl.textContent = G.tools.length;
    if (box) scrollBot(box);
  }).catch(function() {});
}

function renderHistMsg(box, role, content) {
  var row = document.createElement('div');
  row.className = 'msg ' + role;
  var av = document.createElement('div');
  av.className = 'msg-av';
  av.innerHTML = role === 'user'
    ? '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
    : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>';

  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
}

/* ── 发送消息 ──────────────────────────────────────────── */
var _currentTaskId_Active = null;
var _taskBlockToolSeq = 0;
var _streamController = null;

function chatSend() {
  var inp = document.getElementById('chat-text-input');
  if (!inp) return;
  var text = inp.value.trim();
  if (!text || G.busy) return;
  G.busy = true;
  var btn = document.getElementById('chat-send-btn');
  if (btn) btn.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  updateToolbarStat('busy');

  chatAddMsg('user', text);
  G.msgs.push({role: 'user', content: text});
  var aiBub = chatAddMsg('assistant', '', true);

  _currentTaskId_Active = null;
  _taskBlockToolSeq = 0;
  G.tools = [];

  _streamController = new AbortController();
  console.log('[SPA chatSend] stream started, abort controller:', !!_streamController);

  fetch('/api/chat/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, thread_id: G.threadId, model: G.model}),
    signal: _streamController.signal
  }).then(function(r) {
    if (!r.ok) {
      if (aiBub) aiBub.innerHTML = '<p style="color:#f87171">请求失败: ' + r.status + '</p>';
      G.busy = false; if (btn) btn.disabled = false; updateToolbarStat('idle');
      return;
    }
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';
    var full = '';
    function read() {
      reader.read().then(function(result) {
        if (result.done) {
          if (full && aiBub) aiBub.innerHTML = md(full);
          G.busy = false; if (btn) btn.disabled = false; updateToolbarStat('idle');
          updateMsgCount();
          closeTaskBlock();
          updateToolPanelHeader();
          _streamController = null;
          return;
        }
        buf += decoder.decode(result.value, {stream: true});
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var ln = lines[i].trim();
          if (!ln.startsWith('data: ')) continue;
          try {
            var d = JSON.parse(ln.slice(6));
            if (d.type === 'token') {
              full += d.content;
              if (aiBub) aiBub.innerHTML = md(full) + '<div class="loading-dots" style="margin-top:6px"><span></span><span></span><span></span></div>';
              scrollBot(document.getElementById('chat-msgs'));
            } else if (d.type === 'tool') {
              // #region DBG-SSE-tool
              fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_SSE_tool',location:'index.html:chatSend',message:'SSE-TOOL: received tool event',data:{name:d.name,fullLen:full.length},timestamp:Date.now(),runId:'debug',hypothesisId:'H4'})}).catch(function(){});
              // #endregion
              ensureTaskBlock();
              chatAddToolCard(d.name, d.input, d.result);
            } else if (d.type === 'tool_result') {
              updateToolCardResult(d.name, d.result);
            } else if (d.type === 'done') {
              // #region DBG-SSE-done
              fetch('http://127.0.0.1:7295/ingest/0c1f8eb6-a59b-4da7-9818-4871e06c8e54',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4eeec4'},body:JSON.stringify({sessionId:'4eeec4',id:'log_'+(Date.now())+'_SSE_done',location:'index.html:chatSend',message:'SSE-DONE: stream completed',data:{fullLen:full.length,fullFirst50:full.slice(0,50),GtoolsLen:G.tools.length},timestamp:Date.now(),runId:'debug',hypothesisId:'H3'})}).catch(function(){});
              // #endregion
              if (aiBub) aiBub.innerHTML = md(full);
              G.msgs.push({role: 'assistant', content: full});
              loadChatMem();
              updateMsgCount();
              closeTaskBlock();
              updateToolPanelHeader();
              _streamController = null;
            } else if (d.type === 'error') {
              if (aiBub) aiBub.innerHTML = '<p style="color:#f87171">错误: ' + esc(d.content) + '</p>';
            }
          } catch (e) {}
        }
        read();
      }).catch(function(e) {
        if (e.name === 'AbortError') return;
        if (aiBub) aiBub.innerHTML = '<p style="color:#f87171">连接错误: ' + esc(e.message) + '</p>';
        G.busy = false; if (btn) btn.disabled = false; updateToolbarStat('error');
        _streamController = null;
      });
    }
    read();
  }).catch(function(e) {
    if (e.name === 'AbortError') return;
    if (aiBub) aiBub.innerHTML = '<p style="color:#f87171">连接错误: ' + esc(e.message) + '</p>';
    G.busy = false; if (btn) btn.disabled = false; updateToolbarStat('error');
    _streamController = null;
  });
}

/* ── 任务块管理 ──────────────────────────────────────────── */
function ensureTaskBlock() {
  if (_currentTaskId_Active && document.getElementById(_currentTaskId_Active)) return;
  _taskBlockToolSeq = 0;
  _currentTaskId_Active = 'task-' + Date.now();
  var container = document.querySelector('.tool-log-container');
  if (!container) return;
  // 清空空状态占位
  var empty = container.querySelector('.empty-state');
  if (empty) empty.remove();
  var block = document.createElement('details');
  block.className = 'task-block';
  block.id = _currentTaskId_Active;
  block.innerHTML =
    '<summary class="task-header">' +
      '<div class="task-header-left">' +
        '<div class="task-header-icon"><svg width="14" height="14" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></div>' +
        '<span class="task-header-title">任务执行中</span>' +
      '</div>' +
      '<span class="task-header-badge" id="' + _currentTaskId_Active + '-badge">0 个工具</span>' +
      '<span class="task-toggle">&#9660;</span>' +
    '</summary>' +
    '<div class="task-body" id="' + _currentTaskId_Active + '-body"></div>';
  block.setAttribute('open', '');
  container.insertBefore(block, container.firstChild);
}

function closeTaskBlock() {
  if (!_currentTaskId_Active) return;
  var block = document.getElementById(_currentTaskId_Active);
  if (block) {
    block.removeAttribute('open');
    var titleEl = block.querySelector('.task-header-title');
    if (titleEl) titleEl.textContent = '任务完成';
    var badgeEl = block.querySelector('.task-header-badge');
    if (badgeEl) badgeEl.textContent = G.tools.length + ' 个工具';
  }
  _currentTaskId_Active = null;
}

function updateToolPanelHeader() {
  var toolNumEl = document.getElementById('tool-num');
  if (toolNumEl) toolNumEl.textContent = G.tools.length;
}

function updateToolBlockTitle() { updateToolPanelHeader(); }

/* ── 添加工具卡片 ─────────────────────────────────────────── */
function chatAddToolCard(name, input, result) {
  _taskBlockToolSeq++;
  var bodyId = _currentTaskId_Active + '-body';
  var body = document.getElementById(bodyId);
  if (!body) return;

  var toolId = 'tool-card-' + _taskBlockToolSeq;
  G.tools.push({id: toolId, name: name, input: input});

  var inputStr = '';
  if (input) inputStr = typeof input === 'object' ? JSON.stringify(input, null, 2) : String(input);

  var card = document.createElement('details');
  card.className = 'tool-card';
  card.id = toolId;
  card.innerHTML =
    '<summary>' +
      '<div class="tool-card-left">' +
        '<span class="tool-seq">#' + _taskBlockToolSeq + '</span>' +
        '<span class="tool-name">' + esc(name) + '</span>' +
        '<span class="tool-status-dot busy" id="' + toolId + '-dot"></span>' +
      '</div>' +
      '<span class="tool-toggle-icon">&#9660;</span>' +
    '</summary>' +
    '<div class="tool-card-content">' +
      (inputStr ? '<div class="tool-data-label">&#36755;&#20837;&#21442;&#25968;</div><div class="tool-data-value" id="' + toolId + '-input">' + esc(inputStr) + '</div>' : '') +
      '<div class="tool-result-label">&#25191;&#34892;&#32467;&#26524;</div>' +
      '<div class="tool-result-value" id="' + toolId + '-result">&#31561;&#24453;&#32467;&#26524;...</div>' +
    '</div>';
  body.appendChild(card);
  card.setAttribute('open', '');

  var badge = document.getElementById(_currentTaskId_Active + '-badge');
  if (badge) badge.textContent = G.tools.length + ' 个工具';

  var container = document.querySelector('.tool-log-container');
  if (container) container.scrollTop = container.scrollHeight;
}

function updateToolCardResult(name, result) {
  var cards = document.querySelectorAll('.tool-card');
  for (var ci = cards.length - 1; ci >= 0; ci--) {
    var card = cards[ci];
    var nameEl = card.querySelector('.tool-name');
    if (nameEl && nameEl.textContent === name) {
      var dot = card.querySelector('.tool-status-dot');
      if (dot) { dot.classList.remove('busy'); dot.classList.add('done'); }
      var resultEl = document.getElementById(card.id + '-result');
      if (resultEl) resultEl.textContent = String(result || '').slice(0, 500);
      break;
    }
  }
}

function updateToolbarStat(state) {
  var ind = document.getElementById('stat-indicator');
  var txt = document.getElementById('stat-text');
  var stopBtn = document.getElementById('chat-stop-btn');
  if (!ind || !txt) return;
  ind.className = 'toolbar-stat ' + state;
  if (state === 'busy') {
    txt.textContent = '思考中...';
    if (stopBtn) stopBtn.style.display = '';
  } else {
    if (stopBtn) stopBtn.style.display = 'none';
    if (state === 'error') txt.textContent = '连接失败';
    else txt.textContent = '空闲';
  }
}

/* ── 中断生成 ──────────────────────────────────────────── */
function chatStop() {
  if (!_streamController) return;
  _streamController.abort();
  _streamController = null;
  G.busy = false;
  var btn = document.getElementById('chat-send-btn');
  if (btn) btn.disabled = false;
  updateToolbarStat('idle');
  closeTaskBlock();
  updateToolPanelHeader();
  toast('已中断');
}

function updateMsgCount() {
  var el = document.getElementById('msg-count');
  if (el) el.textContent = G.msgs.length;
}

function chatAddMsg(role, content, loading) {
  var box = document.getElementById('chat-msgs');
  if (!box) return null;
  var empty = document.getElementById('chat-empty');
  if (empty) empty.remove();
  var row = document.createElement('div');
  row.className = 'msg ' + role;
  var av = document.createElement('div');
  av.className = 'msg-av';
  av.innerHTML = role === 'user'
    ? '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
    : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>';
  var bub = document.createElement('div');
  bub.className = 'msg-bub';
  bub.innerHTML = loading
    ? '<div class="loading-dots"><span></span><span></span><span></span></div>'
    : md(content);
  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
  scrollBot(box);
  return bub;
}

function loadChatMem() {
  fetch('/api/memory').then(function(r) {
    if (!r.ok) return;
    return r.json();
  }).then(function(mems) {
    if (!mems) return;
    var panel = document.getElementById('mem-list');
    if (!panel) return;
    var memNumEl = document.getElementById('mem-num');
    if (memNumEl) memNumEl.textContent = mems.length;
    if (!mems.length) {
      panel.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg><p>长期记忆<br>存储在向量数据库中</p></div>';
      return;
    }
    var stars = function(n) { return '<span class="mem-star">' + Array(n).fill('\u2605').join('') + '</span>'; };
    var html = mems.map(function(m) {
      return '<div class="mem-card">' +
        '<div class="mem-cat">' + esc(m.category) + '</div>' +
        '<div class="mem-text">' + esc(m.content) + '</div>' +
        '<div class="mem-row">' +
          '<span class="mem-level">' + stars(m.importance) + ' 等级 ' + m.importance + '</span>' +
          '<button class="mem-del" onclick="chatDelMem(\'' + esc(m.id) + '\')" title="删除">\u00d7</button>' +
        '</div>' +
      '</div>';
    }).join('');
    panel.innerHTML = html;
  }).catch(function() {});
}

function chatDelMem(id) {
  fetch('/api/memory/' + id, {method: 'DELETE'}).then(function(r) {
    if (r.ok) { toast('已删除'); loadChatMem(); }
    else toast('删除失败', 'error');
  }).catch(function() { toast('删除失败', 'error'); });
}

function chatClearAll() {
  if (!confirm('确定要清空当前对话记录吗？\n（长期记忆不会被清除）')) return;
  var box = document.getElementById('chat-msgs');
  if (box) box.innerHTML = '<div class="empty-state" id="chat-empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>发送消息开始对话<br><span style="opacity:0.5;font-size:11px">Agent 会记住你的偏好和上下文</span></p></div>';
  var toolContainer = document.querySelector('.tool-log-container');
  if (toolContainer) toolContainer.innerHTML = '<div class="empty-state" style="padding:16px 0"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><p>工具调用记录<br>显示在这里</p></div>';
  G.msgs = [];
  G.tools = [];
  updateMsgCount();
  var toolNumEl = document.getElementById('tool-num');
  if (toolNumEl) toolNumEl.textContent = '0';
  fetch('/api/chat/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({thread_id: G.threadId})
  }).catch(function() {});
  toast('对话已清空');
}

function chatExport() {
  if (!G.msgs.length) { toast('没有可导出的对话', 'error'); return; }
  var lines = ['# 对话记录', '---', ''];
  G.msgs.forEach(function(m) {
    var role = m.role === 'user' ? '用户' : '助手';
    lines.push('**' + role + ':** ' + m.content);
    lines.push('');
  });
  var blob = new Blob(['\ufeff' + lines.join('\n')], {type: 'text/markdown;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '对话记录_' + new Date().toLocaleString('zh-CN').replace(/[\/:]/g, '-') + '.md';
  a.click();
  toast('导出成功');
}
</script>
