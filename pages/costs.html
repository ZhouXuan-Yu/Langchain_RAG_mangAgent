<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成本报表 - Langchain_RAG</title>
  <script src="/lib/shared.js"></script>
  <style>
    body { background: var(--bg); }
    .period-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .period-tab { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--noir-border); color: var(--noir-dim); background: transparent; transition: all 150ms; }
    .period-tab:hover { border-color: var(--noir-border-hi); color: var(--noir-text); }
    .period-tab.active { background: rgba(139,0,0,0.15); border-color: rgba(139,0,0,0.4); color: #c0392b; }
    .cost-chart-wrap { background: var(--noir-card); border: 1px solid var(--noir-border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .cost-chart-title { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--noir-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
    .cost-chart-canvas { width: 100%; height: 120px; }
  </style>
</head>
<body class="noir-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content"></div>
</div>

<script>
// ── 成本页内容模板 ─────────────────────────────────────────────
var COSTS_CONTENT = [
  '<div class="noir-page">',
    '<div class="noir-header">',
      '<h1>成本报表</h1>',
      '<p>// Token 消耗与成本统计</p>',
    '</div>',
    '<div class="period-tabs">',
      '<button class="period-tab" data-days="7" onclick="setPeriod(7)">近 7 天</button>',
      '<button class="period-tab" data-days="30" onclick="setPeriod(30)">近 30 天</button>',
      '<button class="period-tab" data-days="90" onclick="setPeriod(90)">近 90 天</button>',
    '</div>',
    '<div class="cost-summary" id="cost-summary">',
      '<div class="cost-stat-card"><div class="cost-stat-val" id="cost-total">--</div><div class="cost-stat-label">总 Token</div></div>',
      '<div class="cost-stat-card"><div class="cost-stat-val accent" id="cost-cost">--</div><div class="cost-stat-label">预估费用 (USD)</div></div>',
      '<div class="cost-stat-card"><div class="cost-stat-val" id="cost-calls">--</div><div class="cost-stat-label">API 调用次数</div></div>',
      '<div class="cost-stat-card"><div class="cost-stat-val" id="cost-avg">--</div><div class="cost-stat-label">日均 Token</div></div>',
    '</div>',
    '<div class="cost-chart-wrap">',
      '<div class="cost-chart-title">Token 使用趋势</div>',
      '<canvas id="cost-chart" class="cost-chart-canvas"></canvas>',
    '</div>',
    '<div class="noir-card" style="border-radius:8px;overflow:hidden">',
      '<table class="cost-table">',
        '<thead><tr><th>日期</th><th>模型</th><th>Prompt</th><th>Completion</th><th>总计</th><th>费用</th></tr></thead>',
        '<tbody id="cost-tbody"></tbody>',
      '</table>',
    '</div>',
  '</div>'
].join('');

// ── 成本页 show ───────────────────────────────────────────────
function costsOnShow(savedState) {
  if (savedState && savedState.currentPeriod !== undefined) {
    window._currentPeriod = savedState.currentPeriod;
    setPeriodActive(window._currentPeriod);
  }
  loadCosts();
}

// ── 成本页 save ───────────────────────────────────────────────
function costsOnSave() {
  return { currentPeriod: window._currentPeriod };
}

// ── 注册 ─────────────────────────────────────────────────────
registerSPA('/costs', COSTS_CONTENT, costsOnShow, costsOnSave);

// ── 页面初始化 ────────────────────────────────────────────────
injectStyles();
initPage('/costs');

var _currentPeriod = 30;

initSPA('/costs');
setPeriodActive(_currentPeriod);

function setPeriod(days) {
  window._currentPeriod = days;
  setPeriodActive(days);
  loadCosts();
}

function setPeriodActive(days) {
  document.querySelectorAll('.period-tab').forEach(function(t) {
    t.classList.toggle('active', parseInt(t.getAttribute('data-days')) === days);
  });
}

function loadCosts() {
  Promise.all([
    fetch('/api/cost').then(function(r) { return r.ok ? r.json() : null; }),
    fetch('/api/cost/history?days=' + _currentPeriod).then(function(r) { return r.ok ? r.json() : null; })
  ]).then(function(results) {
    var cur = results[0];
    var hist = results[1];
    if (!cur) return;

    var el = document.getElementById('cost-total');
    if (el) el.textContent = cur.total_tokens.toLocaleString();
    el = document.getElementById('cost-cost');
    if (el) el.textContent = '$' + cur.total_cost_usd.toFixed(4);
    el = document.getElementById('cost-calls');
    if (el) el.textContent = cur.num_calls.toLocaleString();

    var dailyAvg = hist && hist.entries && hist.entries.length
      ? Math.round(cur.total_tokens / hist.entries.length)
      : 0;
    el = document.getElementById('cost-avg');
    if (el) el.textContent = dailyAvg.toLocaleString();

    drawChart(hist ? hist.entries : []);

    var tbody = document.getElementById('cost-tbody');
    if (!tbody) return;
    if (!hist || !hist.entries || !hist.entries.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#555;padding:30px;font-family:\'Courier Prime\',monospace">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = hist.entries.map(function(e) {
      return '<tr>' +
        '<td class="val">' + esc(e.date || '--') + '</td>' +
        '<td>' + esc(e.model || '--') + '</td>' +
        '<td>' + (e.prompt_tokens || 0).toLocaleString() + '</td>' +
        '<td>' + (e.completion_tokens || 0).toLocaleString() + '</td>' +
        '<td class="val">' + (e.total_tokens || 0).toLocaleString() + '</td>' +
        '<td class="val" style="color:var(--noir-accent-hi)">$' + (e.cost_usd || 0).toFixed(4) + '</td>' +
      '</tr>';
    }).join('');
  }).catch(function(e) { console.error(e); });
}

function drawChart(entries) {
  var canvas = document.getElementById('cost-chart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var w = rect.width, h = rect.height;

  ctx.clearRect(0, 0, w, h);

  if (!entries || !entries.length) {
    ctx.fillStyle = '#555';
    ctx.font = '12px Courier Prime, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', w / 2, h / 2);
    return;
  }

  var data = entries.slice(0, 30).reverse();
  var maxVal = Math.max.apply(null, data.map(function(e) { return e.total_tokens || 0; })) || 1;

  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (var i = 0; i <= 4; i++) {
    var y = h - (h * i / 4);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(139,0,0,0.3)');
  grad.addColorStop(1, 'rgba(139,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  data.forEach(function(e, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - (h * (e.total_tokens || 0) / maxVal);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#a00000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach(function(e, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - (h * (e.total_tokens || 0) / maxVal);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = '#a00000';
  data.forEach(function(e, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - (h * (e.total_tokens || 0) / maxVal);
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

// 暴露给 SPA polling
window._costsLoad = loadCosts;
</script>

</body>
</html>
