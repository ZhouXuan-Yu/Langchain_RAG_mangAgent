<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库 - Langchain_RAG</title>
  <script src="/lib/shared.js"></script>
  <script src="/lib/kb_spa.js"></script>
  <style>
    body { background: var(--bg); }
    .kb-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kb-stat-card { background: var(--noir-card); border: 1px solid var(--noir-border); border-radius: 8px; padding: 16px; text-align: center; }
    .kb-stat-val { font-family: var(--font-serif); font-size: 24px; font-weight: 700; color: var(--noir-white); }
    .kb-stat-label { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--noir-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .search-bar { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
    .search-input { flex: 1; background: var(--noir-surface); border: 1px solid var(--noir-border); border-radius: var(--radius-sm); color: var(--noir-text); padding: 8px 12px; font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color 150ms; }
    .search-input:focus { border-color: var(--noir-border-hi); }
    .search-input::placeholder { color: var(--noir-muted); }
    .type-filter { display: flex; gap: 6px; }
    .type-chip { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--noir-border); color: var(--noir-dim); background: transparent; transition: all 150ms; }
    .type-chip:hover { border-color: var(--noir-border-hi); color: var(--noir-text); }
    .type-chip.active { background: rgba(139,0,0,0.15); border-color: rgba(139,0,0,0.4); color: #c0392b; }
    .doc-card-err { font-size: 10px; color: #c0392b; line-height: 1.35; margin-top: 6px; opacity: 0.9; }
  </style>
</head>
<body class="noir-theme">

<div id="app">
  <header class="topbar" id="header"></header>
  <div class="main-area" id="main-content"></div>
</div>

<script>
registerSPA('/kb', KB_CONTENT, kbOnShow, kbOnSave);
injectStyles();
initPage('/kb');
initSPA('/kb');
</script>

</body>
</html>
